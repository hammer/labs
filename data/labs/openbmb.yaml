description: >
  <p>OpenBMB (Open Lab for Big Model Base) is a premier collaborative lab and global
  leader in on-device and ultra-efficient LLMs. Unlike state-run national laboratories, 
  OpenBMB operates on a <strong>hybrid academic-startup model</strong>, serving as the 
  external deployment arm for <strong>Tsinghua THUNLP</strong>. Its commercial 
  counterpart, <strong>ModelBest</strong> (Mianbi Intelligence), funnels resources into the 
  ecosystem, including a major 2026 funding round led by <strong>China Telecom</strong> 
  raising hundreds of millions of yuan.</p>

  <p>The lab's "Edge-First" philosophy focuses on <strong>Intelligence Density</strong> 
  rather than brute-force scaling. While larger labs race toward 10-trillion parameter 
  models, OpenBMB's research (exemplified by the <strong>MiniCPM</strong> series) aims 
  to package GPT-4-level multimodal performance into 8B-parameter models that run 
  locally on smartphones and consumer-grade hardware like the NVIDIA RTX 5090. Through 
  its partnership with China Telecom, OpenBMB also gains prioritized access to the 
  <strong>Tianyi Cloud</strong> national computing network.</p>

  <p>OpenBMB is famous for its ecosystem of efficiency-focused tools, including 
  <strong>BMTrain</strong>, <strong>BMInf</strong>, and <strong>OpenPrompt</strong>. 
  The lab also created <a href="https://github.com/OpenBMB/ChatDev">ChatDev</a> 
  (multi-agent software development) and the 
  <a href="https://github.com/OpenBMB/ToolBench">ToolLLM/ToolBench</a> framework. 
  The lab's lineage traces back to the early CPM models co-sponsored by 
  <a href="/labs/baai">BAAI</a> as part of the Wu Dao program.</p>

  <p>The two principal investigators are
  <a href="https://scholar.google.com/citations?user=zIgT0HMAAAAJ">Prof. Maosong
  Sun</a> and <a href="https://scholar.google.com/citations?user=9T8ycmEAAAAJ">Prof.
  Zhiyuan Liu</a>, both from Tsinghua's Department of Computer Science. Their team 
  has been instrumental in proving that massive-scale reasoning can be democratized through 
  highly-optimized, small-but-mighty architectures.</p>
people:
  - name: Maosong Sun (孙茂松)
    role: Senior PI; Professor, Tsinghua University
    formerly: Head of Dept, CS, Tsinghua (2007-2010); Executive VP, Tsinghua AI Institute; PhD City University of Hong Kong (2004); BS/MS Tsinghua (1986/1988)
    description: >
      <p>Director of <strong>THUNLP</strong> (Tsinghua Natural Language Processing
      Laboratory), the earliest and most influential NLP research unit in China.
      Professor at Tsinghua since the late 1980s. Led the development of "Jiuge" (九歌),
      the AI poetry writing system (2015). Student of Huang Changning (黄昌宁), considered
      the pioneer of NLP in China.</p>

      <p><strong>~70,800 citations</strong>. <strong>ACL Fellow</strong> (2022 &mdash;
      the only Chinese scholar selected that year), Foreign Member of Academia Europaea
      (2020), CAAI Fellow (2021). His THUNLP lab, together with
      <a href="/people/zhiyuan-liu">Zhiyuan Liu</a>'s ModelBest Inc., forms the
      foundation of the OpenBMB ecosystem and the CPM/MiniCPM model families.</p>
    urls:
      - label: Google Scholar
        url: https://scholar.google.com/citations?user=zIgT0HMAAAAJ
      - label: OpenReview
        url: https://openreview.net/profile?id=~Maosong_Sun1
  - name: Zhiyuan Liu (刘知远)
    url: https://nlp.csai.tsinghua.edu.cn/~lzy/
    role: PI; Full Professor, Tsinghua University (2025); Co-founder & Chief Scientist, ModelBest Inc.
    formerly: PhD Tsinghua (2011, advisor Maosong Sun); Associate Professor Tsinghua (2018-2025)
    description: >
      <p>Co-leads <strong>THUNLP</strong> with <a href="/people/maosong-sun">Maosong
      Sun</a> and co-founded <strong>ModelBest Inc. (面壁智能)</strong> in August 2022
      &mdash; the commercial entity behind the <strong>MiniCPM</strong> series. MiniCPM
      demonstrated that 2-4B parameter models can match much larger models on device,
      with MiniCPM-o achieving "Gemini 2.5 Flash level" multimodal live streaming on
      phones. Also led earlier CPM-1 and CPM-2 large-scale pre-trained model development
      for the WuDao collaboration with BAAI.</p>

      <p><strong>~84,900 citations</strong>. Key contributions in knowledge graph
      representation learning (TransE follow-ups), graph neural networks, and open-source
      NLP toolkits (THULAC, OpenKE, OpenNE &mdash; 10K+ GitHub stars combined). MIT
      Technology Review Innovators Under 35 China (2018). Promoted to full professor at
      Tsinghua in 2025. All degrees from Tsinghua (BS 2006, PhD 2011).</p>
    urls:
      - label: Google Scholar
        url: https://scholar.google.com/citations?user=dT0v5u0AAAAJ
