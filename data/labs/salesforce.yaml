description: >
  <p>Salesforce AI Research, led by Chief Scientist
  <a href="https://scholar.google.com/citations?user=ImpbxLsAAAAJ">Silvio Savarese</a>
  (formerly Stanford CS), produces open research spanning vision-language,
  code generation, time series, and protein engineering. The lab's work feeds into
  Salesforce's <strong>Agentforce</strong> enterprise AI platform ($1.4B ARR,
  12K customers).</p>

  <p>Key research includes <strong><a href="https://arxiv.org/abs/2301.12597">BLIP-2</a></strong>
  (2023, vision-language bootstrapping, ICML 2023),
  <strong><a href="https://arxiv.org/abs/2203.13474">CodeGen</a></strong> (2022, code
  generation up to 16B), <strong><a href="https://arxiv.org/abs/2402.02592">Moirai</a></strong>
  (2024, time series foundation model, #1 on GIFT-Eval, ICML 2024), and
  <strong><a href="https://arxiv.org/abs/2004.03497">ProGen</a></strong> (protein generation,
  Nature Biotechnology 2023). The <a href="https://github.com/salesforce/LAVIS">LAVIS</a>
  library (11K stars) provides a unified framework for vision-language research.</p>
