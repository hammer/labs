description: >
  One of China's "AI Tigers," originating from the Knowledge Engineering Group
  (KEG) at Tsinghua University. Rebranded internationally as Z.ai in 2025.
  First major LLM-focused company to IPO (HKEX: 02513, Jan 8 2026). Cornerstone
  is the GLM series using autoregressive blank-infilling objective. First
  frontier-scale model trained entirely on Huawei Ascend chips.
