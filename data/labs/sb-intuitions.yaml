description: >
  <p><strong>SB Intuitions</strong> is <a
  href="https://en.wikipedia.org/wiki/SoftBank_Corp.">SoftBank Corp.</a>'s
  wholly-owned subsidiary for Japanese-specialized large language models, launched in
  August 2023 and framed publicly as "an OpenAI for Japan." President &amp; CEO
  <strong>Hironobu Tamba</strong> concurrently runs SoftBank's Data Platform Strategy
  Division. The company operates the <strong>Sarashina Lab</strong> research division
  and has grown to <strong>150+ employees</strong>, actively recruiting AI researchers
  from Japan and abroad.</p>

  <p>The flagship <strong>Sarashina</strong> model family progressed from the
  <strong>Sarashina2</strong> dense series (7B/13B/<strong>70B</strong>, trained
  from scratch on 2.1T tokens, MIT license, August 2024) to
  <strong>Sarashina2-8x70B</strong>, a ~465B-total MoE built via sparse upcycling and
  released for academic and industrial research (November 2024). The smaller, more
  compute-efficient <strong>Sarashina2.2</strong> family (0.5B/1B/3B, March 2025) added
  instruction-tuning with strong Japanese scores &mdash; the 3B-Instruct beats
  Qwen2.5-3B-Instruct on Elyza-tasks-100 (3.75 vs 2.99). Multimodal variants followed
  (<strong>Sarashina2.2-Vision-3B</strong>, <strong>Sarashina2.2-OCR</strong>) along
  with embedding and encoder models (<strong>Sarashina-Embedding-v2-1B</strong>,
  <strong>ModernBERT-Ja</strong>). The commercial <strong>Sarashina mini</strong> API
  (70B) launched November 28, 2025 for SoftBank enterprise customers.</p>

  <p>Sarashina Lab has produced a strong cluster of foundational training-stability
  and scaling papers at top venues: <strong><a
  href="/outputs/sb-intuitions/spike-no-more">Spike No More</a></strong> (COLM 2025,
  architectural stability), <strong><a href="/outputs/sb-intuitions/large-vocabulary">Large
  Vocabulary Size Improves LLMs</a></strong> (ACL Findings 2025), <strong><a
  href="/outputs/sb-intuitions/scaling-laws-upcycling-moe">Scaling Laws for Upcycling
  MoE</a></strong> (ICML 2025 &mdash; the basis for Sarashina2-8x70B itself), and
  <strong><a href="/outputs/sb-intuitions/wso-scheduler">Pre-training LLM without
  Learning Rate Decay</a></strong> (ICLR 2026). Training compute runs on SoftBank's
  NVIDIA Blackwell-based <strong>DGX SuperPOD</strong>, announced in 2025 as the
  world's largest Blackwell cluster for LLM development.</p>
