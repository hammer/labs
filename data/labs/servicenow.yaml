description: >
  <p>ServiceNow AI Research, part of the Advanced Technology Group, focuses on
  enterprise AI agents and efficient language models. The team originated from
  <strong>Element AI</strong> (acquired 2020), Montreal's pioneering AI startup
  co-founded by Yoshua Bengio. Key researchers include
  <a href="https://scholar.google.com/citations?user=LR6aJcEAAAAJ">Alexandre Drouin</a>
  and Christopher Pal (Polytechnique Montreal, Mila founding faculty).</p>

  <p>ServiceNow co-created <strong><a href="https://arxiv.org/abs/2305.06161">StarCoder</a></strong>
  (2023, 15.5B) and <strong>StarCoder2</strong> (2024, up to 15B) through the BigCode
  collaboration with HuggingFace. The <strong>Apriel</strong> model family (2025) is
  ServiceNow's own SLM line: Apriel-5B (4.8B, 4.5T tokens) and
  <strong>Apriel-Nemotron-15B-Thinker</strong> (reasoning model with NVIDIA, matches
  o1-mini at half the memory). Apache 2.0.</p>
