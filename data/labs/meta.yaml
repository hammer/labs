description: >
  <p>Meta's AI research division, <strong>FAIR</strong> (Fundamental AI Research), was
  founded in 2013 by <a href="https://en.wikipedia.org/wiki/Yann_LeCun">Yann LeCun</a>
  (2018 Turing Award). In June 2025, Meta formed <strong>Meta Superintelligence Labs
  (MSL)</strong> combining FAIR, foundation models, and applied research, co-led by
  <a href="https://en.wikipedia.org/wiki/Alexandr_Wang">Alexandr Wang</a> (Chief AI
  Officer, former Scale AI CEO) and
  <a href="https://en.wikipedia.org/wiki/Nat_Friedman">Nat Friedman</a> (former GitHub CEO).
  LeCun departed in November 2025 to found AMI Labs.</p>

  <p>Meta's <strong>Llama</strong> series became the most influential open-weight model
  family: LLaMA 1 (2023) proved open models could match proprietary ones, Llama 2 was
  the first commercially licensable open LLM, and <strong>Llama 3.1 405B</strong> (2024)
  was the largest open model at release. <strong>Llama 4</strong> (2025) introduced MoE
  architecture with Scout (109B/17B active, 10M context) and Maverick (400B/17B active).
  Cumulative Llama downloads exceeded 1.2B by April 2025.</p>

  <p>Beyond Llama, Meta created <strong><a href="https://pytorch.org">PyTorch</a></strong>
  (the dominant deep learning framework, now under the Linux Foundation), foundational
  vision models <strong><a href="https://arxiv.org/abs/2104.14294">DINO</a></strong> and
  <strong><a href="https://arxiv.org/abs/2304.02643">Segment Anything (SAM)</a></strong>,
  and <strong><a href="https://arxiv.org/abs/2205.01068">OPT-175B</a></strong> (the first
  fully open GPT-3-scale model).</p>
