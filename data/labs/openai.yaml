description: >
  <p>OpenAI was founded in December 2015 as a nonprofit AI research lab by
  <a href="https://en.wikipedia.org/wiki/Sam_Altman">Sam Altman</a>,
  <a href="https://en.wikipedia.org/wiki/Ilya_Sutskever">Ilya Sutskever</a>,
  <a href="https://en.wikipedia.org/wiki/Greg_Brockman">Greg Brockman</a>, and others.
  It restructured to a capped-profit entity in 2019 and completed conversion to a
  <strong>Public Benefit Corporation</strong> in October 2025, with Microsoft holding ~27% equity.
  In March 2026 OpenAI raised <strong>$122B at an $852B valuation</strong> &mdash; the largest
  private funding round in history &mdash; from SoftBank, Amazon, NVIDIA, and others. Revenue
  reached ~$2B/month by early 2026 with 900M+ weekly ChatGPT users.</p>

  <p>OpenAI's GPT series defined the modern LLM era: <strong>GPT-2</strong> (2019, 1.5B)
  demonstrated emergent text generation, <strong>GPT-3</strong> (2020, 175B) introduced
  few-shot learning, and <strong>GPT-4</strong> (2023) set the frontier for multimodal
  reasoning. The <strong>o-series</strong> reasoning models (o1, o3) pioneered test-time
  compute scaling, and <strong>GPT-5.4</strong> (2026, AA index 57, 1M context) is the
  current flagship. Beyond language, OpenAI created <strong>DALL-E</strong> (text-to-image),
  <strong>Whisper</strong> (speech recognition), <strong>Codex</strong> (powering GitHub
  Copilot), and <strong>Sora</strong> (video generation).</p>

  <p>The lab's foundational technique papers reshaped the entire field:
  <strong><a href="https://arxiv.org/abs/1707.06347">PPO</a></strong> (2017) became the
  default RL algorithm for alignment, <strong><a href="https://arxiv.org/abs/2001.08361">Scaling
  Laws</a></strong> (2020) established power-law relationships driving compute investment,
  <strong><a href="https://arxiv.org/abs/2103.00020">CLIP</a></strong> (2021) enabled
  text-image alignment used by virtually all image generation models, and
  <strong><a href="https://arxiv.org/abs/2203.02155">InstructGPT/RLHF</a></strong> (2022)
  created the SFT &rarr; Reward Model &rarr; PPO pipeline now standard across the industry.
  OpenAI also released influential open-source tools including
  <a href="https://github.com/openai/gym">Gym</a> (37K stars) and
  <a href="https://github.com/triton-lang/triton">Triton</a> (19K stars).</p>
people:
  - name: Sam Altman
    url: https://en.wikipedia.org/wiki/Sam_Altman
    role: CEO & Co-founder
    formerly: Y Combinator (President); Loopt (Founder)
    description: >
      <p>Attended Stanford University (CS), dropped out after two years. Co-founded Loopt at age 19 (acquired for $43.4M). President of Y Combinator (2014&ndash;2019, chosen by Paul Graham), overseeing investments in Airbnb, DoorDash, Reddit, Instacart, and Twitch. Co-founded OpenAI in December 2015; became CEO in 2019.</p>
  - name: Jakub Pachocki
    url: https://en.wikipedia.org/wiki/Jakub_Pachocki
    role: Chief Scientist
    formerly: OpenAI Research Director; PhD CMU
    urls:
      - label: OpenReview
        url: https://openreview.net/profile?id=~Jakub_Pachocki1
  - name: Mark Chen
    role: Chief Research Officer
    formerly: Jane Street Capital; MIT (BS Math & CS)
    urls:
      - label: Google Scholar
        url: https://scholar.google.com/citations?user=5fU-QMwAAAAJ
      - label: OpenReview
        url: https://openreview.net/profile?id=~Mark_Chen1
    description: >
      <p>Chief Research Officer at OpenAI. Led Codex development and the team that built GPT-4. Previously worked on reinforcement learning and robotics at OpenAI.</p>
  - name: Noam Brown
    url: https://noambrown.github.io/
    role: VP of Research (reasoning, o-series)
    formerly: Meta FAIR (CICERO, Diplomacy); PhD CMU (Libratus, Pluribus)
    urls:
      - label: Google Scholar
        url: https://scholar.google.com/citations?user=RLDbLcUAAAAJ
      - label: OpenReview
        url: https://openreview.net/profile?id=~Noam_Brown1
    description: >
      <p>PhD in CS from Carnegie Mellon University (under Tuomas Sandholm). Co-created <strong>Libratus</strong> (2017) and <strong>Pluribus</strong> (2019), superhuman poker AIs that defeated top professionals (Pluribus on the cover of <em>Science</em>). At Meta FAIR, co-developed CICERO (human-level Diplomacy AI). At OpenAI, leads reasoning research behind the <strong>o1/o3 series</strong>. MIT TR 35 Under 35.</p>
  - name: Alec Radford
    role: Former Core Researcher (GPT, CLIP, Whisper author; departed Dec 2024)
    urls:
      - label: Google Scholar
        url: https://scholar.google.com/citations?user=dOad5HoAAAAJ
      - label: OpenReview
        url: https://openreview.net/profile?id=~Alec_Radford1
  - name: Ilya Sutskever
    url: https://en.wikipedia.org/wiki/Ilya_Sutskever
    role: Co-founder & Former Chief Scientist (departed May 2024; now CEO of SSI)
    formerly: Google Brain; PhD University of Toronto (Geoffrey Hinton)
    urls:
      - label: Google Scholar
        url: https://scholar.google.com/citations?user=x04W_mMAAAAJ
      - label: OpenReview
        url: https://openreview.net/profile?id=~Ilya_Sutskever1
    description: >
      <p>BS (2005), MS (2007), PhD (2013) in CS from University of Toronto, supervised by <a href="https://en.wikipedia.org/wiki/Geoffrey_Hinton">Geoffrey Hinton</a>. Co-built <strong>AlexNet</strong> (2012) with Hinton and Krizhevsky, igniting the modern deep learning revolution. Google Brain (2013); created sequence-to-sequence learning. Co-founded OpenAI (2015), served as Chief Scientist. Founded <strong>Safe Superintelligence Inc. (SSI)</strong> in June 2024.</p>
  - name: John Schulman
    url: http://joschu.net/
    role: Co-founder (departed Aug 2024; now at Thinking Machines Lab)
    formerly: PhD UC Berkeley (Pieter Abbeel)
    urls:
