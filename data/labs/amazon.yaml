    description: >
      <p>BS/MS from KU Leuven; PhD from Stanford (2008, Andrew Ng&rsquo;s first PhD student). Professor of AI and Robotics at UC Berkeley, founded Berkeley Robot Learning Lab. Co-founded Gradescope (acq. Turnitin 2018) and Covariant (robotics AI). Joined Amazon August 2024; heads LLM efforts within AGI org (December 2025). ACM Prize in Computing (2021). His students co-founded OpenAI (John Schulman), Perplexity, Physical Intelligence, and others.</p>
