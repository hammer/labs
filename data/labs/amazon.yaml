description: >
  <p>Amazon's AI efforts span AWS AI services, the AGI division (formed 2023), and
  an $8B strategic investment in <a href="/labs/anthropic">Anthropic</a>. The AGI org
  was originally led by <strong>Rohit Prasad</strong> (former Alexa AI head), then
  reorganized under <strong>Peter DeSantis</strong> in December 2025, unifying AI,
  custom silicon (Trainium/Inferentia), and quantum computing.</p>

  <p>The <strong>Nova</strong> model family launched at AWS re:Invent 2024 with multimodal
  Pro, Lite, and Micro tiers, followed by <strong>Nova Premier</strong> (April 2025, 1M
  context, AA index 19). Nova 2 (December 2025) added reasoning capabilities and Nova Act
  for browser-agent automation. Amazon also builds custom AI chips: <strong>Trainium2</strong>
  (500K+ deployed) and Trainium3 (3nm, late 2025).</p>

  <p><a href="https://en.wikipedia.org/wiki/Pieter_Abbeel">Pieter Abbeel</a> (UC Berkeley,
  ACM Prize in Computing) joined in August 2024 via the Covariant acquisition to lead
  frontier model research. Proprietary.</p>
