description: >
  Centerpiece of China's "National Team" in AI. Co-founded by Shanghai
  Municipal Government with SJTU, Fudan, and SenseTime. Functions as the
  "industrial hub" of southern China, bridging theory and application.
  Manages the OpenXLab ecosystem (OpenGVLab, OpenMMLab, OpenDILab).
  SenseTime provides the SenseCore supercomputing infrastructure.
