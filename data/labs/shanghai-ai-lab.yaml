description: >
  <p>The Shanghai Artificial Intelligence Laboratory, officially known as the 
  <strong>Pujiang Laboratory</strong> (浦江实验室), is a state-backed 
  <strong>new-type research institution</strong> 
  (新型研发机构) established in July 2020 by the <a href="https://english.shanghai.gov.cn/">Shanghai Municipal Government</a>. 
  The institution is most commonly referred to as <strong>PJLab</strong> in technical contexts 
  (reflected in its domain, <code>pjlab.org.cn</code>) and <strong>SAIL</strong> in international 
  media reports. Established in partnership with <a href="https://en.sjtu.edu.cn/">SJTU</a>, 
  <a href="https://www.fudan.edu.cn/en/">Fudan University</a>, and <a href="/labs/sensetime">SenseTime</a>, 
  it serves as a core National Laboratory anchoring China's strategic "National Team" in AI.</p>

  <p>With an estimated annual budget of <strong>5&ndash;8 billion yuan ($700 million&ndash;$1.1 billion)</strong>, 
  it is heavily subsidized by the <strong>Shanghai AI Pilot Fund</strong>. The lab operates a 
  dedicated compute cluster in the <strong>Lingang New Area</strong> housing over 
  <strong>30,000 accelerators</strong>. The lab maintains a symbiotic relationship with 
  <strong>SenseTime</strong>, leveraging its SenseCore AI infrastructure for large-scale training. 
  This collaboration produced the <strong>InternLM</strong> series and <strong>InternVL</strong>, 
  which consistently lead open-source benchmarks.</p>

  <p>Beyond traditional LLMs, the lab is a leader in "AI for Science" through the 
  <strong>Shanghai Academy of AI for Science (SAIS)</strong>. PJLab sits alongside 
  <a href="/labs/baai">BAAI</a> (Beijing) and <a href="/labs/pcl">Pengcheng Lab</a> (Shenzhen) 
  as the three regional pillars of China's national AI infrastructure under the State Council's 
  New Generation AI strategy.</p>
people:
  - name: Yu Qiao (乔宇)
    role: Director, Shanghai AI Laboratory
    formerly: Professor & Director, SIAT/CAS; Postdoc, CUHK MMLab (2006-2007); PhD University of Electro-Communications Tokyo; BE/ME Chongqing University
    description: >
      <p>Director of <strong>Shanghai AI Laboratory</strong> (est. July 2020), the
      state-backed research institution that produces the <strong>InternLM</strong>
      (LLM), <strong>InternVL</strong> (VLM), and <strong>InternImage</strong>
      (vision foundation model) families. Previously Professor and Director at
      the Shenzhen Institutes of Advanced Technology (SIAT), Chinese Academy of
      Sciences, where he founded the SIAT MMLab as a satellite of CUHK's
      Multimedia Laboratory.</p>

      <p>Research spans computer vision, pattern recognition, and large multimodal
      models. <strong>~131,000 citations</strong>. Youth Science and Technology
      Innovation Leader (Ministry of Science and Technology). Lu Jiaxi Young
      Researcher Award (CAS, 2012). PhD from the University of
      Electro-Communications, Tokyo.</p>
    urls:
      - label: Google Scholar
        url: https://scholar.google.com/citations?user=gFtI-8QAAAAJ
      - label: OpenReview
        url: https://openreview.net/profile?id=~Yu_Qiao1
  - name: Dahua Lin (林达华)
    url: http://dahua.site/
    role: Senior Researcher & OpenMMLab Director
    formerly: Co-founder, SenseTime (2014); Associate Professor, CUHK; PhD MIT (2012); MPhil CUHK (2006); BEng USTC (2004)
    description: >
      <p>Creator and Director of <strong><a href="https://github.com/open-mmlab">OpenMMLab</a></strong>,
      arguably the most prolific open-source computer vision ecosystem in the
      world: 54 repos, 30+ vision libraries, 300+ algorithms, 2,000+ pretrained
      models. <strong>MMDetection</strong> alone has 32.6K GitHub stars. Co-founded
      <strong><a href="https://en.wikipedia.org/wiki/SenseTime">SenseTime</a></strong>
      in October 2014 with Xiaoou Tang and Xiaogang Wang (SenseTime listed on
      HKEX December 2021). Also directs the Interdisciplinary Institute of AI
      at CUHK.</p>

      <p>PhD from <strong>MIT</strong> (2012), MPhil from CUHK (Best Master Thesis
      Award), BEng from USTC. <strong>~85,000&ndash;90,000 citations</strong>.
      Best Student Paper at NeurIPS 2010. Supervised CUHK teams winning ImageNet
      2016, ActivityNet 2016-2017, COCO 2018-2019. 120+ papers at CVPR, ICCV,
      ECCV, ICML, NeurIPS.</p>
    urls:
