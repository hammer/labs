description: >
  <p><strong>Microsoft Research (MSR)</strong>, founded in 1991, is one of the world's
  largest industrial research labs with 1,000+ researchers across Redmond, Cambridge,
  Beijing, Bangalore, NYC, and Montreal. Microsoft is also OpenAI's largest investor
  (~27% equity) and integrates OpenAI models into Copilot products.</p>

  <p>Microsoft's own model research focuses on <strong>small language models</strong>:
  the <strong>Phi series</strong> demonstrated that carefully curated synthetic data can
  make small models (1.3B&ndash;14B) competitive with models 10&ndash;100x larger.
  <a href="https://arxiv.org/abs/2306.11644">Phi-1</a> (2023, "Textbooks Are All You Need")
  launched the series, and <a href="https://arxiv.org/abs/2412.08905">Phi-4</a> (2024, 14B)
  surpasses its teacher model on STEM benchmarks.</p>

  <p>MSR produced several foundational techniques:
  <strong><a href="https://arxiv.org/abs/2106.09685">LoRA</a></strong> (Low-Rank
  Adaptation, 2021) became the dominant parameter-efficient fine-tuning method,
  <strong><a href="https://arxiv.org/abs/2310.11453">BitNet</a></strong> (2023)
  pioneered 1-bit Transformers, and
  <strong><a href="https://github.com/microsoft/DeepSpeed">DeepSpeed</a></strong>
  (42K stars) is critical distributed training infrastructure used to train BLOOM-176B
  and other frontier models.</p>
