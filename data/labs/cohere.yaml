description: >
  <p><a href="https://en.wikipedia.org/wiki/Cohere">Cohere</a> is a Canadian AI
  company founded in 2019 by <strong>Aidan Gomez</strong> (CEO, co-author of
  <a href="https://arxiv.org/abs/1706.03762">"Attention Is All You Need"</a>),
  <strong>Ivan Zhang</strong>, and
  <strong><a href="https://en.wikipedia.org/wiki/Nick_Frosst">Nick Frosst</a></strong>
  (Geoffrey Hinton's first hire at Google Brain Toronto). With $1.6B raised at a
  $7B valuation and ~$240M ARR in 2025, Cohere focuses on enterprise-grade
  sovereign AI with secure, on-premises deployment. An IPO is widely anticipated
  for 2026.</p>

  <p>The <strong>Command</strong> model family evolved from proprietary origins
  through the open-weight <a href="https://arxiv.org/abs/2504.00698">Command
  R/R+</a> (35B/104B, 128K context) to the current flagship
  <strong>Command A</strong> (111B, 256K context, Mar 2025), which uses a novel
  hybrid sliding-window + global attention architecture and model merging rather
  than MoE. Cohere also pioneered enterprise retrieval with the <strong>Embed</strong>
  and <strong>Rerank</strong> families.</p>

  <p>Through <strong><a href="https://cohere.com/research/aya">Cohere Labs</a></strong>
  (formerly Cohere For AI, founded by
  <a href="https://en.wikipedia.org/wiki/Sara_Hooker">Sara Hooker</a>), Cohere
  produced the <strong>Aya</strong> multilingual model series &mdash; built through
  a 3,000+ researcher global collaboration covering 101 languages. Aya Expanse,
  Aya Vision, and Tiny Aya advanced multilingual capability, safety, and
  edge deployment. The lab also produced influential AI governance research
  including <a href="https://arxiv.org/abs/2407.14933">"Consent in Crisis"</a>
  (NeurIPS 2024). Sara Hooker departed in 2025 to co-found Adaption Labs;
  <a href="https://en.wikipedia.org/wiki/Jo%C3%ABlle_Pineau">Joelle Pineau</a>
  (former Meta FAIR VP) joined as Chief AI Officer.</p>
