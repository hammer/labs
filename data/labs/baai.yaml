github: https://github.com/FlagOpen
region: china
founded: 2018-11
type: nonprofit
description: >
  Beijing Academy of Artificial Intelligence. China's first non-profit AI
  research institution, functioning as a collaborative hub bridging academic
  research and industrial application. Founded by Baidu, ByteDance, Xiaomi,
  Meituan, Megvii, Tsinghua, and Peking University. Famous for the Wu Dao
  program and FlagOpen ecosystem. Operates the Jiuding computing platform
  for domestic hardware training.
