description: >
  <p>The Beijing Academy of Artificial Intelligence (BAAI), also known as the 
  <strong>Zhiyuan Institute</strong>, was established in November 2018 as China's 
  first <a href="https://en.wikipedia.org/wiki/Non-profit_organizations_in_China#Private_non-enterprise_units">private non-enterprise unit</a> 
  (民办非企业单位) focused on AI research. While supported by the 
  <a href="https://english.beijing.gov.cn/">Beijing Municipal Government</a> and the 
  Haidian District, its non-profit legal structure allows it to function as a 
  collaborative "hub" bridging academia and industry. Its founding members include 
  <a href="/labs/baidu">Baidu</a>, <a href="/labs/bytedance-seed">ByteDance</a>, 
  <a href="/labs/xiaomi">Xiaomi</a>, <a href="/labs/meituan">Meituan</a>, and Megvii.</p>

  <p>BAAI is a primary beneficiary of Beijing's strategic investment in AI, with access 
  to municipal and national funds (including the $8.2 billion National AI Industry 
  Investment Fund). The academy supports approximately 300 top researchers through 
  its <strong>Zhiyuan Scholars Plan</strong> and operates the <strong>Jiuding</strong> 
  AI-computing platform, which provides 1,000P of capacity for high-end research.</p>

  <p>The academy is famous for the <strong>Wu Dao program</strong>, which in 2021 produced 
  Wu Dao 2.0 (at 1.75 trillion parameters, the world's largest model at the time). 
  Through its <strong>FlagOpen</strong> ecosystem, BAAI provides foundational 
  infrastructure &mdash; including the widely-used <strong>BGE</strong> embeddings 
  and <strong>FlagScale</strong> training toolkit &mdash; to reduce entry barriers 
  for the Chinese AI community.</p>
