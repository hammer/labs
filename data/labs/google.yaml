description: >
  <p>Google's AI research spans two decades of foundational contributions. <strong>Google
  Brain</strong> (founded 2011 by Jeff Dean, Andrew Ng, Greg Corrado) and
  <strong><a href="https://en.wikipedia.org/wiki/Google_DeepMind">DeepMind</a></strong>
  (founded 2010 in London by <a href="https://en.wikipedia.org/wiki/Demis_Hassabis">Demis
  Hassabis</a>, acquired 2014 for ~$650M) merged in April 2023 into <strong>Google
  DeepMind</strong>. Alphabet (parent since 2015) has a market cap of ~$3.56T.</p>

  <p>Google researchers authored many of the most important papers in modern AI:
  <strong><a href="https://arxiv.org/abs/1706.03762">Attention Is All You Need</a></strong>
  (2017, the Transformer), <strong><a href="https://arxiv.org/abs/1810.04805">BERT</a></strong>
  (2018), <strong><a href="https://arxiv.org/abs/2010.11929">Vision Transformer</a></strong>
  (2020), <strong><a href="https://arxiv.org/abs/2201.11903">Chain-of-Thought</a></strong>
  (2022), and <strong><a href="https://arxiv.org/abs/2203.15556">Chinchilla</a></strong>
  (2022). The <strong>Gemini</strong> model family advanced from 1.0 (2023) to
  <strong>Gemini 3.1 Pro</strong> (2026, AA index 57, tied #1). The open-weight
  <strong>Gemma</strong> series (2024&ndash;) provides Apache 2.0 models up to 27B.</p>

  <p>DeepMind's scientific breakthroughs include <strong>AlphaGo</strong> (defeated world Go
  champion, 2016), <strong><a href="https://www.nature.com/articles/s41586-021-03819-2">AlphaFold
  2</a></strong> (solved protein structure prediction, predicted 200M+ structures, won the
  <strong>2024 Nobel Prize in Chemistry</strong> for Hassabis and John Jumper), and
  <strong>GraphCast</strong> (ML weather forecasting outperforming ECMWF).
  <a href="https://en.wikipedia.org/wiki/Noam_Shazeer">Noam Shazeer</a>, Transformer
  co-author, returned from Character.AI in August 2024 to co-lead Gemini development.</p>
