description: >
  <p><a href="https://en.wikipedia.org/wiki/Baidu">Baidu</a> is the pioneer of
  Chinese AI, having established its Institute of Deep Learning (IDL) in 2013 under
  CEO <a href="https://en.wikipedia.org/wiki/Robin_Li">Robin Li (Li Yanhong)</a>.
  The hiring of <a href="https://en.wikipedia.org/wiki/Andrew_Ng">Andrew Ng</a> as
  Chief Scientist (2014&ndash;2017) to lead Baidu Research in Silicon Valley
  marked a pivotal moment for Chinese AI ambitions on the global stage.</p>

  <p>Baidu's AI ecosystem is defined by two pillars. The first is the
  <strong>ERNIE</strong> (Enhanced Representation through Knowledge Integration)
  series, progressing from ERNIE 1.0 (2019) through ERNIE 5.0 (2025), with
  <a href="https://yiyan.baidu.com/">ERNIE Bot (Wenxin Yiyan)</a> as the consumer
  product. The second is <strong><a href="https://github.com/PaddlePaddle/Paddle">PaddlePaddle</a></strong>,
  China's first and most widely deployed domestic deep learning framework,
  with over 11 million developers and 860,000+ enterprise users.</p>

  <p>Baidu also develops the <strong>Kunlun XPU</strong> AI chips (now in their
  third generation), the <a href="https://apollo.auto/">Apollo</a> autonomous
  driving platform (operating robotaxi services in multiple Chinese cities), and
  the <a href="https://cloud.baidu.com/product/wenxinworkshop">Qianfan</a>
  model-as-a-service platform on Baidu Cloud. Haifeng Wang serves as CTO,
  overseeing the ERNIE and NLP research divisions.</p>
people:
  - name: Robin Li
    url: https://en.wikipedia.org/wiki/Robin_Li
    role: Co-founder & CEO
    description: >
      <p>BS in Information Science from Peking University; MS in CS from University at Buffalo. Created the <strong>RankDex</strong> algorithm (1996) for search ranking &mdash; predating and cited by Google&rsquo;s PageRank patent. Worked at Dow Jones and Infoseek. Co-founded Baidu in January 2000, building it into China&rsquo;s dominant search engine (80%+ market share). NASDAQ IPO (2005). Net worth ~$5.5B.</p>
  - name: Haifeng Wang
    url: https://ir.baidu.com/management/haifeng-wang/
    role: CTO & ERNIE Lead
    urls:
      - label: OpenReview
        url: https://openreview.net/profile?id=~Haifeng_Wang3
    description: >
      <p>BS/MS/PhD from Harbin Institute of Technology. Joined Baidu in 2010; CTO since May 2019. Heads Baidu AI Group and Baidu Research. Led <strong>ERNIE</strong> development (ERNIE Bot reached 430M users). <strong>ACL President</strong> (2013), founding chair of Asia-Pacific ACL chapter (2018). ACL Fellow, IEEE Fellow, CAAI Fellow.</p>
