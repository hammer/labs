description: >
  <p><strong>Pengcheng Laboratory (PCL)</strong>, established in March 2018 in Shenzhen, 
  is a state-backed <a href="https://www.csis.org/analysis/chinas-new-type-research-and-development-organizations">new-type research institution</a> 
  (新型研发机构) and a cornerstone of China's National Laboratory system. With an estimated 
  annual budget of <strong>10&ndash;12 billion yuan ($1.4&ndash;$1.7 billion)</strong>, 
  it serves as the hardware backbone of China's AI strategy, specifically through its leadership 
  in the "East Data West Compute" project and the <strong>China Computing Net (C&sup2;NET)</strong>.</p>

  <p>The lab's research is powered by the <strong>Pengcheng Cloud Brain</strong>, a world-class 
  AI supercomputing infrastructure. Cloud Brain II provides 1,000 PFLOPS of compute using 
  Huawei Ascend processors. In early 2026, the lab began scaling <strong>Cloud Brain III</strong> 
  toward a target of <strong>16 EFLOPS</strong>, designed to be the primary training ground for 
  10-trillion+ parameter models using entirely domestic interconnects and silicon.</p>

  <p>Research at PCL is characterized by large-scale collaboration, notably the <strong>PanGu</strong> 
  series co-developed with Huawei, and proprietary flagships like <strong>PengCheng-Mind</strong>. 
  The lab's recent expansion into Embodied AI (the PAR world model) and "AI for Science" 
  (PengCheng-Nebula) positions it as a key driver of China's domestic technology self-reliance.</p>
