description: >
  <p>MIT CSAIL spinoff founded in December 2023 by
  <a href="https://www.raminhasani.com/">Ramin Hasani</a>,
  <a href="https://en.wikipedia.org/wiki/Daniela_Rus">Daniela Rus</a> (MIT CSAIL
  director, MacArthur Fellow), Alexander Amini, and Mathias Lechner. Raised $297M
  ($250M Series A led by AMD) at a ~$2.4B valuation.</p>

  <p>Liquid AI builds on <strong><a href="https://arxiv.org/abs/2006.04439">liquid
  neural networks</a></strong> (AAAI 2021) &mdash; continuous-time recurrent networks
  rooted in dynamical systems and signal processing, distinct from standard Transformers.
  The <strong>LFM2</strong> family (2025) uses a hybrid backbone combining gated short
  convolutions with grouped query attention, optimized for edge deployment. Models range
  from 350M to 24B (MoE, 2B active) with vision-language and speech variants.
  Apache 2.0.</p>
