description: >
  <p><a href="https://en.wikipedia.org/wiki/Nvidia">NVIDIA</a> (NASDAQ: NVDA),
  the world's most valuable company at ~$4.3T, dominates AI compute through its
  GPU hardware but also operates <strong>NVIDIA Research</strong> — a ~400-person
  division (est. 2006) spanning 21+ labs. Led by Chief Scientist
  <a href="https://scholar.google.com/citations?user=YZHj-Y4AAAAJ">Bill Dally</a>
  (109K+ citations, former Stanford CS chair), the research arm produces
  frontier models alongside the infrastructure that trains them.</p>

  <p>The <strong>Nemotron</strong> family evolved through three architectural
  phases: dense Transformers (Nemotron-4 15B/340B, 2024), NAS-compressed
  Llama derivatives with reasoning toggle (Llama-Nemotron Super 49B / Ultra
  253B, early 2025), and the current hybrid
  <strong>Mamba-2 + LatentMoE + Attention</strong> architecture (Nemotron 3,
  late 2025&ndash;2026). The flagship
  <strong><a href="https://arxiv.org/abs/2512.20856">Nemotron 3 Super</a></strong>
  (Mar 2026, 120B/12B active, 1M context) achieved AA Intelligence Index 36
  (#2 in its class) with 5x throughput over previous generation. NVIDIA
  uniquely open-sources not just weights but complete training data (10T+
  tokens) and recipes.</p>

  <p>NVIDIA's AI infrastructure outputs are equally influential:
  <strong><a href="https://github.com/NVIDIA/Megatron-LM">Megatron-LM</a></strong>
  (the distributed training framework underlying most large-scale model training),
  <strong>NeMo</strong> (training toolkit), and the
  <strong><a href="https://arxiv.org/abs/2504.03624">Nemotron-H</a></strong>
  hybrid architecture (56B, 20T tokens in FP8 &mdash; the largest public FP8
  pre-training). Other research highlights include
  <strong><a href="https://arxiv.org/abs/2501.03575">Cosmos</a></strong> (world
  foundation models for physical AI) and
  <strong><a href="https://arxiv.org/abs/2411.13676">Hymba</a></strong> (hybrid
  attention+SSM heads in parallel).</p>
