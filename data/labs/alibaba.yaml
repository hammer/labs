    description: >
      <p>Alibaba CTO overseeing the <strong>Qwen (Tongyi Qianwen)</strong> large
      model family and the Wan video models. Assumed direct control of Qwen team
      in March 2026 after the departure of Tech Lead Junyang Lin. Sits on the
      Foundation Model Task Force with CEO Eddie Wu. Joined Alibaba in 2015 after
      11 years as Research Partner at Microsoft Research.</p>

      <p>Entered the <strong>School of the Gifted Young at USTC</strong> in 1994.
      PhD from Columbia University (2004). <strong>~37,000 citations</strong>.
      <strong>ACM Fellow</strong> (2024). IEEE Fellow (2019).</p>
