description: >
  <p>Anthropic is an AI safety company founded in 2021 by
  <a href="https://en.wikipedia.org/wiki/Dario_Amodei">Dario Amodei</a> and
  <a href="https://en.wikipedia.org/wiki/Daniela_Amodei">Daniela Amodei</a>,
  along with several former OpenAI researchers including Tom Brown (GPT-3 first author),
  Jared Kaplan (scaling laws co-author), Sam McCandlish, and
  <a href="https://en.wikipedia.org/wiki/Chris_Olah">Chris Olah</a>. Organized as a
  Public Benefit Corporation focused on AI safety research. Raised <strong>$30B in
  February 2026</strong> at a $380B valuation, with Amazon ($8B total), Google, and
  others as key investors. Revenue reached ~$19B ARR by March 2026.</p>

  <p>The <strong>Claude</strong> model family has rapidly advanced from Claude 1 (2023)
  to <strong>Claude Opus 4.6</strong> (2026, AA index 46, 1M context), consistently
  ranking among the top frontier models. Claude 4 Opus set SWE-bench records (72.5%),
  and Claude 4.5 Opus was the first model to exceed 80% on SWE-bench Verified.
  <strong><a href="https://github.com/anthropics/claude-code">Claude Code</a></strong>,
  an agentic coding CLI launched in 2025, reached $2.5B+ ARR by March 2026.</p>

  <p>Anthropic's research contributions are foundational:
  <strong><a href="https://arxiv.org/abs/2212.08073">Constitutional AI</a></strong>
  (2022) introduced RLAIF with explicit principles, replacing human preference labeling
  with AI self-critique.
  <strong><a href="https://transformer-circuits.pub/2024/scaling-monosemanticity/">Scaling
  Monosemanticity</a></strong> (2024) used sparse autoencoders to extract interpretable
  features from Claude 3 Sonnet at production scale. The company also created the
  <strong><a href="https://github.com/modelcontextprotocol">Model Context Protocol
  (MCP)</a></strong>, an open standard for LLM-tool integration adopted by OpenAI,
  Google, and others.</p>
