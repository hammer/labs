description: >
  <p>xAI was founded in March 2023 by
  <a href="https://en.wikipedia.org/wiki/Elon_Musk">Elon Musk</a> and 11 AI researchers
  from DeepMind, OpenAI, Google, and Microsoft Research. In February 2026, SpaceX
  acquired xAI at a combined <strong>$1.25T valuation</strong>. The company raised over
  $47B across multiple rounds, with investors including NVIDIA, Fidelity, Qatar Investment
  Authority, and MGX.</p>

  <p>xAI's <strong>Grok</strong> model family progressed rapidly from Grok-1
  (314B MoE, <a href="https://github.com/xai-org/grok-1">open-sourced</a> with 51K stars)
  to <strong>Grok-4.20</strong> (2026, multi-agent system, AA index 48, 2M context).
  Grok-3 (February 2025) was trained on <strong>200K GPUs</strong> at the Colossus
  supercomputer in Memphis with 10x more compute than its predecessor. Grok-4 (July 2025)
  introduced native tool-calling and extended reasoning with an AA index of 42.</p>

  <p>The <strong>Colossus</strong> supercomputer in Memphis, Tennessee was built in 122
  days and houses 150K H100 + 50K H200 + 30K GB200 GPUs (~250MW). A second facility
  (Colossus 2) adds 110K GB200 GPUs toward a 1M GPU target. All co-founders except
  Musk have since departed, including
  <a href="https://scholar.google.com/citations?user=_N2COeAAAAAJ">Igor Babuschkin</a>
  (DeepMind AlphaStar/AlphaCode) and
  <a href="https://scholar.google.com/citations?user=ymzxRhAAAAAJ">Jimmy Ba</a>
  (Adam optimizer, Layer Normalization co-author).</p>
