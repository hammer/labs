description: >
  <p><a href="https://en.wikipedia.org/wiki/Huawei#Noah's_Ark_Lab">Noah's Ark Lab</a>
  is the primary AI research division of
  <a href="https://en.wikipedia.org/wiki/Huawei">Huawei Technologies</a>, established
  in 2012 as part of the Huawei 2012 Laboratories (named after the company's ethos of
  preparing for worst-case scenarios). Headquartered in Hong Kong with offices in
  Shenzhen, Beijing, Shanghai, Edmonton, London, and Paris, the lab conducts
  fundamental research in NLP, computer vision, recommendation systems, and AI
  for science.</p>

  <p>US sanctions since 2019 have profoundly shaped Huawei's AI strategy, making
  domestic compute sovereignty a critical priority. Huawei's
  <strong><a href="https://www.hiascend.com/">Ascend</a></strong> AI chip series
  (910, 910B, 910C) and the <strong>CANN</strong> software stack have become the
  backbone of China's efforts to reduce dependence on NVIDIA GPUs. Many Chinese AI
  labs &mdash; including <a href="/labs/zai">Z.ai</a>, <a href="/labs/stepfun">StepFun</a>,
  and state-backed institutions &mdash; now train on Ascend clusters. The
  <strong><a href="https://www.mindspore.cn/en">MindSpore</a></strong> deep learning
  framework is Huawei's answer to TensorFlow/PyTorch.</p>

  <p>The lab's model research centers on the <strong>PanGu</strong> series, developed in
  collaboration with <a href="/labs/pcl">Pengcheng Laboratory</a> and trained on its
  Cloud Brain II supercomputer. PanGu-Alpha (2021, 200B) was one of China's earliest
  large LLMs, and PanGu-Sigma (2023, 1T sparse MoE on Ascend 910) marked a
  trillion-parameter milestone &mdash; but also the end of Huawei's bid to compete
  in the general-purpose chatbot race. After 2023, Huawei pivoted decisively to
  <strong>"AI for Industry"</strong> with a tiered "5+N+X" architecture: five L0
  foundation models (NLP, CV, multimodal, prediction, scientific computing),
  industry-specific L1 models (finance, mining, meteorology), and scenario-specific
  L2 models. PanGu 5.5 (June 2025, 718B MoE with 256 experts) introduced deep
  reasoning for industrial R&D while achieving 8x better inference efficiency than
  PanGu-Sigma. <a href="https://www.nature.com/articles/s41586-023-06185-3">PanGu-Weather</a>
  became the first AI model to outperform traditional numerical weather prediction
  (published in <em>Nature</em>), validating Huawei's thesis that specialized models
  can achieve global impact without being a chatbot.</p>

  <p>Other widely-cited research outputs include efficient architectures like
  <a href="https://arxiv.org/abs/1911.11907">GhostNet</a> and
  <a href="https://arxiv.org/abs/1909.10351">TinyBERT</a>, and the
  <a href="https://github.com/huawei-noah/HEBO">HEBO</a> Bayesian optimization
  library which won the NeurIPS 2020 Black-Box Optimization Challenge.</p>
