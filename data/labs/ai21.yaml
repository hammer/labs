description: >
  <p>AI21 Labs was founded in 2017 in Tel Aviv by
  <a href="https://en.wikipedia.org/wiki/Yoav_Shoham">Yoav Shoham</a> (Stanford AI
  professor emeritus, ACM-AAAI Allen Newell Award),
  <a href="https://en.wikipedia.org/wiki/Amnon_Shashua">Amnon Shashua</a> (Mobileye
  CEO, Hebrew University professor), and Ori Goshen. Raised ~$283M at a $1.4B
  valuation. NVIDIA was in advanced acquisition talks ($2&ndash;3B) as of late 2025.</p>

  <p>AI21 trained the <strong>Jurassic</strong> series (2021, 178B dense) and then
  introduced the <strong><a href="https://arxiv.org/abs/2403.19887">Jamba</a></strong>
  architecture (2024) &mdash; the first production-grade <strong>SSM-Transformer-MoE
  hybrid</strong> combining Mamba state-space layers with Transformer attention and
  mixture-of-experts routing. Jamba 1.7 Large (398B total / 94B active, 256K context)
  is the current flagship. The hybrid architecture achieves 2.5x faster inference than
  equivalent dense Transformers while fitting on a single 80GB GPU.</p>
