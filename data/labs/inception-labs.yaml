description: >
  <p>Inception Labs was founded in 2024 by
  <a href="https://cs.stanford.edu/~ermon/">Stefano Ermon</a> (Stanford, co-inventor
  of diffusion models for images, DDIM, and DPO),
  <a href="https://aditya-grover.github.io/">Aditya Grover</a> (UCLA, IJCAI Computers
  and Thought Award), and
  <a href="https://www.cs.cornell.edu/~kuleshov/">Volodymyr Kuleshov</a> (Cornell Tech).
  Raised $56M in seed funding from Menlo Ventures, with angel investors including
  Andrew Ng and Andrej Karpathy.</p>

  <p>The lab introduced <strong>diffusion-based LLMs (dLLMs)</strong> &mdash; a
  fundamentally different generation paradigm where tokens are produced in parallel
  via iterative denoising rather than one-at-a-time autoregressive generation.
  <strong><a href="https://arxiv.org/abs/2506.17298">Mercury</a></strong> models
  achieve ~1,000 tokens/sec on H100, roughly <strong>10x faster</strong> than
  comparable autoregressive models. Mercury 2 (February 2026) reaches AA index 33
  with reasoning capability.</p>
