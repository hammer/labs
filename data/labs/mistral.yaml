description: >
  <p><a href="https://en.wikipedia.org/wiki/Mistral_AI">Mistral AI</a> is a
  French AI company founded in April 2023 by three
  <a href="https://en.wikipedia.org/wiki/%C3%89cole_Polytechnique">Ecole
  Polytechnique</a> alumni: <strong>Arthur Mensch</strong> (CEO, ex-Google
  DeepMind), <strong>Guillaume Lample</strong> (Chief Scientist, ex-Meta FAIR),
  and <strong>Timothee Lacroix</strong> (CTO, ex-Meta FAIR, contributed to
  LLaMA). With $3B+ raised across five equity rounds (seed through Series C)
  and valued at ~$14B, Mistral is Europe's leading AI lab. Revenue surged from
  ~$20M ARR in January 2025 to ~$400M ARR by January 2026.</p>

  <p>Mistral pioneered efficient open-weight models:
  <a href="https://arxiv.org/abs/2310.06825">Mistral 7B</a> (Sep 2023)
  introduced Sliding Window Attention and beat Llama 2 13B;
  <a href="https://arxiv.org/abs/2401.04088">Mixtral 8x7B</a> (Dec 2023)
  popularized Sparse MoE for open models; Mixtral 8x22B scaled to 141B/39B
  active. The current flagship
  <strong>Mistral Large 3</strong> (Dec 2025, 675B/41B active MoE, Apache 2.0)
  competes with frontier models across reasoning, coding, and multilingual
  tasks. <strong>Mistral Small 4</strong> (Mar 2026, 119B/6.5B active MoE)
  unifies instruct, reasoning, multimodal, and agentic coding in one model.</p>

  <p>Beyond LLMs, Mistral has built a full product ecosystem:
  <strong><a href="https://chat.mistral.ai">Le Chat</a></strong> (consumer AI
  assistant), <strong>Codestral</strong> (code-specialized models including the
  Mamba2-based Codestral Mamba),
  <strong><a href="https://arxiv.org/abs/2410.07073">Pixtral</a></strong>
  (vision-language models), <strong>Voxtral</strong> (speech understanding and
  TTS), <strong><a href="https://arxiv.org/abs/2506.10910">Magistral</a></strong>
  (pure RL reasoning), <strong>Mistral Saba</strong> (Arabic/South Asian
  languages), and <strong>Devstral</strong> (agentic coding, 72.2% SWE-Bench
  Verified). Mistral is building a 13,800 GB300 GPU data center near Paris
  ($830M debt financing, Mar 2026) and holds defense and enterprise contracts
  including with the French military and CMA CGM.</p>
