description: >
  <p><a href="https://en.wikipedia.org/wiki/Kakao">Kakao</a> (KRX: 035720) is
  South Korea's leading internet conglomerate, operator of
  <strong>KakaoTalk</strong> (Korea's dominant messaging app). Its AI research
  arm evolved from <strong>Kakao Brain</strong> (est. 2017, produced KoGPT and
  Karlo) which was merged back into Kakao Corp in May 2024, forming the
  internal <strong>Kanana</strong> AI organization.</p>

  <p>The <strong><a href="https://arxiv.org/abs/2502.18934">Kanana</a></strong>
  model family (EMNLP 2025 Oral) progressed rapidly: Kanana 1.0 (Feb 2025,
  2B&ndash;32B dense, 3T tokens) introduced depth up-scaling and distillation;
  Kanana 1.5 (May 2025) added the first MoE variant (15.7B/3B active) with
  128K YaRN context; <strong>Kanana-2</strong> (Dec 2025, 30B/3B active MoE,
  128 experts, MLA attention, 6 languages) achieves MT-Bench 8.42, MATH 86.26,
  and AIME 2024 78.3 in thinking mode &mdash; comparable to Qwen3-30B-A3B.
  <strong>Kanana-o</strong> is Korea's first unified multimodal model
  (text+voice+image), proprietary.</p>

  <p>Kakao pursues a dual strategy: own Kanana models plus partnerships with
  <strong>OpenAI</strong> (ChatGPT in KakaoTalk, 8M users) and
  <strong>Google</strong> (on-device AI, TPU infrastructure). Sold Daum portal
  to <a href="/labs/upstage">Upstage</a> in Jan 2026 to focus on AI.</p>
