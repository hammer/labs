description: >
  <p>Apple's AI strategy centers on <strong>on-device + Private Cloud Compute</strong>
  rather than API-served models. <strong>Apple Intelligence</strong>, announced at WWDC
  2024, integrates foundation models across iPhone, iPad, and Mac for writing tools,
  image generation, Siri enhancements, and cross-app actions.</p>

  <p>The <strong>Apple Foundation Models (AFM)</strong> include a ~3B on-device model and
  larger server models, using a proprietary mixture-of-experts architecture. Apple published
  technical reports in <a href="https://arxiv.org/abs/2407.21075">2024</a> and
  <a href="https://arxiv.org/abs/2507.13575">2025</a> detailing the architecture,
  training, and safety measures. The company also contributes open research:
  <strong><a href="https://github.com/ml-explore/mlx">MLX</a></strong> (25K stars), a
  NumPy-like ML framework optimized for Apple Silicon, and
  <strong><a href="https://arxiv.org/abs/2404.14619">OpenELM</a></strong>, fully open
  efficient language models.</p>

  <p>Apple's scaling science program spans three complementary groups:
  <a href="https://scholar.google.com/citations?user=wcX-UW4AAAAJ">Afshin Dehghan</a>
  leads vision tokenization research
  (<a href="https://arxiv.org/abs/2509.14476">AToken</a>,
  <a href="https://arxiv.org/abs/2502.13967">FlexTok</a>),
  <a href="https://scholar.google.com/citations?user=Sv2TGqsAAAAJ">Josh Susskind</a>
  (Distinguished Engineer) leads multimodal architectures and scaling laws
  (<a href="https://arxiv.org/abs/2504.07951">NMM Scaling Laws</a>,
  <a href="https://arxiv.org/abs/2411.14402">AIMv2</a>), and
  <a href="https://pierreablin.com/">Pierre Ablin</a> leads training optimization
  (<a href="https://arxiv.org/abs/2409.03137">AdEMAMix</a>,
  <a href="https://arxiv.org/abs/2507.09404">data mixture scaling laws</a>).
  <a href="https://scholar.google.com/citations?user=Vs-MdPcAAAAJ">Samy Bengio</a>
  (103K+ citations) leads ML research overall, with Amar Subramanya named VP of AI
  in December 2025.</p>
