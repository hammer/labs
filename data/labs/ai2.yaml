description: >
  <p>The <a href="https://en.wikipedia.org/wiki/Allen_Institute_for_AI">Allen
  Institute for AI</a> (Ai2) is a nonprofit research institute founded in 2014
  by Microsoft co-founder <a href="https://en.wikipedia.org/wiki/Paul_Allen">Paul
  Allen</a>, headquartered in Seattle. Funded by the Paul Allen estate ($3.1B
  foundation) with annual budget exceeding $100M, plus $152M from NSF and NVIDIA
  for the OMAI scientific-AI initiative (2025). ~300 researchers.</p>

  <p>Ai2's defining contribution is the <strong>OLMo</strong> (Open Language Model)
  ecosystem &mdash; the first competitive LLM to release <em>everything</em>:
  weights, training data, code, logs, and thousands of intermediate checkpoints
  under Apache 2.0. <a href="https://arxiv.org/abs/2402.00838">OLMo 1</a> (Feb 2024)
  established the paradigm; <a href="https://arxiv.org/abs/2501.00656">OLMo 2</a>
  (Dec 2024, up to 32B/6T tokens) was the first fully open model to outperform
  GPT-3.5 Turbo; <a href="https://arxiv.org/abs/2512.13961">OLMo 3</a> (Dec 2025,
  32B, 65K context, Think variants) introduced 3-stage training with mid-training
  and long-context phases. The latest <strong>OLMo Hybrid</strong> (Mar 2026)
  combines Gated DeltaNet + Transformer at 3:1 ratio, reaching OLMo 3 quality in
  35% fewer tokens.</p>

  <p>The OLMo stack includes <strong><a href="https://arxiv.org/abs/2402.00159">Dolma</a></strong>
  (3T+ token open pretraining corpus),
  <strong><a href="https://arxiv.org/abs/2411.15124">Tülu</a></strong>
  (post-training framework introducing RLVR &mdash; Reinforcement Learning with
  Verifiable Rewards), <strong><a href="https://arxiv.org/abs/2409.02060">OLMoE</a></strong>
  (first fully open MoE LLM, 6.9B/1.3B active, 64 experts), and
  <strong>OLMES</strong> (evaluation standard). In March 2026, Ai2 lost CEO Ali
  Farhadi and several key researchers to Microsoft's Superintelligence team, though
  all 2026 programs remain funded.</p>
