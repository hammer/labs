description: >
  <p><strong>Zhongguancun Academy (ZGCA, 中关村学院)</strong> and the
  <strong>Zhongguancun Institute of Artificial Intelligence (ZGCI)</strong> form a
  Beijing-government-backed AI research consortium operating under a "one body, two
  institutes" model. ZGCA was founded September 13, 2024 as a joint Ministry of Education
  + Beijing Municipality higher education institution. ZGCI was founded October 28, 2024
  under the Beijing Municipal Science & Technology Commission as a national-level applied
  research institute.</p>

  <p>Leadership has been described as "Microsoft Research Asia AI4Science 2.0" &mdash;
  the institution recruited an extraordinary concentration of ex-MSR talent. President
  <a href="https://en.wikipedia.org/wiki/Tie-Yan_Liu">Liu Tieyan (Tie-Yan Liu)</a>
  (97K+ citations, IEEE/ACM/AAIA Fellow) was Distinguished Scientist at MSR AI4Science
  and previously Assistant Managing Director at MSR Asia. Vice President
  <a href="https://taoqin.github.io/">Tao Qin</a> (41K+ citations, 2025 ACM Fellow) led
  MSR AI for Science Asia. Executive VP <a href="http://faculty.bicmr.pku.edu.cn/~dongbin/">Bin
  Dong</a> is concurrently Boya Distinguished Professor at Peking University.
  ZGCI President <strong>Bin Shao</strong> founded MSR's Computational Biology and
  Scientific Computing Research Groups. Deputy Director
  <strong>Shuxin Zheng</strong> headed Microsoft Scientific
  Foundation Models.</p>

  <p>The institution's flagship achievement is the <strong>AI-Driven Agentic Design
  Platform for Tumor Immunotherapy Drugs</strong>: candidate <strong>Z212</strong>
  (entirely AI-generated) achieved 83.7% tumor growth inhibition in mouse models and
  advanced to Preclinical Candidate stage, compressing the design pipeline from years
  to 6 months. Other research includes <strong>MorphoBench</strong> (adaptive reasoning
  benchmark), <strong>MegaDFT</strong> (Kohn-Sham DFT scaled to 100K atoms),
  <strong>RLinf</strong> (open-source RL for embodied AI), and an
  <strong>ICML 2025 SeePhys Challenge win</strong> beating Gemini 2.5 and o3.
  Partnerships include 31 universities (Tsinghua, Harbin Institute of Technology) and
  CASIA joint PhD programs.</p>

  <p>ZGCA and ZGCI share a campus at <strong>Haidian Dayue Information Technology
  Park</strong> (No. 17 Daniufang Second Ring Road, Haidian District, Beijing).
  Together with <a href="/labs/baai">BAAI</a> (founded 2018, headquartered ~15 km
  southeast in Wudaokou near Tsinghua), they form a complementary triad in Beijing's
  Haidian District AI ecosystem: <strong>BAAI</strong> focuses on foundational
  infrastructure (BGE embeddings, FlagOS computing stack, Aquila/Tele-FLM LLMs, the
  WuJie multimodal/embodied series), while <strong>ZGCA</strong> drives talent
  cultivation and AI-for-Science research and <strong>ZGCI</strong> drives applied
  industrial research (drug discovery, embodied AI, robotics). The two institutions
  operate independently &mdash; no documented co-authored papers or interlocking
  leadership &mdash; but compete and collaborate within the same ecosystem of
  partners (Tsinghua, PKU, Infinigence AI) and present at the annual
  <a href="https://www.zgcforum.com.cn/en/">Zhongguancun Forum</a>.</p>
