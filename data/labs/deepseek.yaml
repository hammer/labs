    description: >
      <p>Research Scientist at DeepSeek focused on LLM reasoning and self-improving
      systems. Core contributor to <strong>DeepSeek-R1</strong> (published in Nature
      2025), lead/first author of <strong>DeepSeekMath</strong> (pushing mathematical
      reasoning limits in open models), and co-author of DeepSeek-Prover (theorem
      proving), Math-Shepherd (step-by-step verification without human annotations,
      ACL 2024), and <a href="/outputs/microsoft/tora">ToRA</a> (ICLR 2024, tool-integrated
      reasoning, interned at MSRA).</p>

      <p>PhD from Tsinghua University (2019&ndash;2024, advisor
      <a href="https://coai.cs.tsinghua.edu.cn/hml">Minlie Huang</a>). BS from
      Beihang University (multiple national scholarships, math competition awards).
      <strong>MIT Technology Review "35 Under 35"</strong> (2024). NeurIPS Area Chair.</p>
