description: >
  <p><strong>IBM Research</strong>, founded in 1945, is one of the oldest and largest
  industrial research labs with 3,000+ researchers. Five Nobel Prizes, six Turing Awards.
  Current director Jay Gambetta (appointed October 2025, succeeding
  Dario Gil who became US DOE Under Secretary for Science).</p>

  <p>IBM's current AI focus is the <strong>Granite</strong> model family, purpose-built
  for enterprise with <strong>ISO 42001 certification</strong> and transparent data
  governance. <strong>Granite 4.0</strong> (October 2025) uses a novel
  <strong>hybrid Mamba-2/Transformer + MoE architecture</strong> achieving 70% less
  memory and 2x inference speed. The H-Small variant (32B/9B active) reaches AA index 23.
  <strong>Granite Code</strong> (2024) provides open coding models in 116 languages.</p>

  <p>Chief Scientist <a href="https://scholar.google.com/citations?user=77QlzIwAAAAJ">Ruchir
  Puri</a> (IBM Fellow, 50+ patents) leads research direction. All Granite models are
  Apache 2.0.</p>
