description: >
  <p><a href="https://en.wikipedia.org/wiki/Sarvam_AI">Sarvam AI</a> is India's
  leading sovereign AI lab, founded in August 2023 by
  <strong>Pratyush Kumar</strong> (CEO, PhD ETH Zurich, co-founded
  <a href="https://ai4bharat.iitm.ac.in/">AI4Bharat</a>) and
  <strong>Vivek Raghavan</strong> (PhD Carnegie Mellon, ex-Aadhaar architect).
  ~$41M Series A from Lightspeed and Khosla Ventures; reportedly raising
  $300-350M Series B at ~$1.5B valuation with NVIDIA as investor. Inaugural
  member of the <strong>NVIDIA Nemotron Coalition</strong> (GTC 2026).</p>

  <p>Trains on 4,096 H100s via India's IndiaAI Mission. Flagship
  <strong>Sarvam-105B</strong> (Mar 2026, 105B/10.3B active MoE, 128 experts,
  128K context, MLA-style attention) and <strong>Sarvam-30B</strong> are trained
  from scratch for India's 22 scheduled languages. AA Intelligence: 18 (105B).
  Full-stack approach spans text, speech (Saaras), vision/OCR, translation
  (with AI4Bharat), and hardware (Kaze smart glasses). Apache 2.0.</p>
