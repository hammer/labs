description: >
  <p>Reka was founded in 2022 by former DeepMind and Meta FAIR researchers:
  <a href="https://dyogatama.github.io/">Dani Yogatama</a> (CEO, 27K citations),
  Cyprien de Masson d'Autume (CTO), Qi Liu, and Mikel Artetxe. Co-founder
  <a href="https://www.yitay.net/">Yi Tay</a> (62K citations) departed in late 2024
  to return to Google DeepMind. Raised $168M including a $110M Series B (July 2025)
  at a $1B valuation from NVIDIA, DST Global, and Snowflake. ~50 employees.</p>

  <p>Reka trains <strong>natively multimodal models from scratch</strong> (text, images,
  video, audio) across four size tiers: Spark (1B), Edge (7B), Flash (21B), and Core
  (67B). <strong>Reka Flash 3</strong> (March 2025, 21B) is open-weight under Apache 2.0.
  The lab focuses on multimodal understanding and generation with a small, research-focused
  team of ex-DeepMind scientists.</p>
