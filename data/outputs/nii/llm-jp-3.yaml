name: LLM-jp-3 (172B)
slug: llm-jp-3
lab: nii
type: model
date: 2024-12-24
flagship: true
sources:
  - label: HuggingFace (172B)
    url: https://huggingface.co/llm-jp/llm-jp-3-172b-instruct3
  - label: Announcement
