description: >
  <p>Adaptive difficulty reasoning benchmark with <strong>1,300+ test questions</strong>.
  Validated against advanced reasoning models including <strong>o3 and GPT-5</strong>.
  Designed to dynamically adjust question difficulty to expose reasoning capability
  gaps that fixed benchmarks miss.</p>

  <p>Open-sourced via OpenDCAI organization, one of the first major benchmark
  contributions from ZGCA.</p>
