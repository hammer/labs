description: >
  <p>Systematic method using scaling laws to determine the <strong>optimal data mixture
  for any target domain</strong>, replacing trial-and-error approaches. Predicts model
  loss as a function of model size, training tokens, and domain weights.</p>

  <p>Validated across LLM, native multimodal model, and large vision model pre-training.
  Parameters estimated from small-scale runs extrapolate to larger scales and unseen
  domain weights. NeurIPS 2025. By Shukor, Bethune, Busbridge, Grangier, Fini,
  El-Nouby, and Ablin.</p>
