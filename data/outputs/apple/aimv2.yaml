description: >
  <p>"Multimodal Autoregressive Pre-training of Large Vision Encoders." Pairs a vision
  encoder with a multimodal decoder that generates both raw image patches and text tokens.
  AIMv2-3B achieves <strong>89.5% on ImageNet-1k</strong> with frozen trunk.</p>

  <p>Consistently outperforms CLIP and SigLIP in multimodal understanding while scaling
  more efficiently &mdash; outperforming SOTA with fewer training samples. CVPR 2025
  Highlight. By Fini, Shukor, Li, Susskind, El-Nouby et al. Apache 2.0.</p>
