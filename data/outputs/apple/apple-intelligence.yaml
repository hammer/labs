description: >
  <p>Technical report detailing the foundation models powering Apple Intelligence.
  ~3B on-device model and larger server models running on Apple's Private Cloud Compute.
  Uses a proprietary <strong>mixture-of-experts architecture</strong>. Trained with
  adapter-based fine-tuning for specific tasks (summarization, proofreading, Siri).</p>

  <p>The 2025 update added multilingual support (16 languages), multimodal capabilities,
  and improved tool use and reasoning. Distinctive for its <strong>on-device + private
  cloud split</strong>, processing data locally where possible and using dedicated Apple
  Silicon servers when not. Proprietary.</p>
