description: >
  <p>Open-source <strong>multilingual text embedding</strong> model family optimized for
  agentic AI systems. Decoder-only architecture with last-token pooling and L2
  normalization. Trained via contrastive learning on large-scale multilingual data with
  knowledge distillation from larger embedding models. Supports <strong>94 languages</strong>
  with 32K token context.</p>

  <p>The 27B variant achieves <strong>#1 on MTEB-v2</strong> (74.3), the industry-standard
  multilingual embedding benchmark. Designed as a foundational layer for memory, ranking,
  and orchestration in agent-based systems &mdash; enabling cross-source retrieval,
  persistent memory over extended interactions, and dynamic context updates across
  multi-step tasks. MIT License.</p>
tags:
  - open-weight
  - embedding
  - multilingual
model:
  architecture: dense
  variants:
    - name: Harrier 27B
      parameters: 27B
      notes: "MTEB-v2: 74.3, 5376-dim embeddings"
    - name: Harrier 0.6B
      parameters: 0.6B
      notes: "MTEB-v2: 69.0, 1024-dim embeddings"
    - name: Harrier 270M
