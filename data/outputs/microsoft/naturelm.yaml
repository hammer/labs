description: >
  <p>Sequence-based <strong>science foundation model</strong> from Microsoft Research
  AI for Science that unifies <strong>small molecules, materials, proteins, DNA, and
  RNA</strong> for text-driven scientific discovery. Available in 1B, 8B, and
  <strong>46.7B (8&times;7B MoE)</strong> sizes.</p>

  <p>Trained on <strong>hundreds of billions of curated tokens</strong> from biology,
  chemistry, and materials science. Enables cross-domain integration tasks combining
  knowledge across modalities. Top performance on many scientific tasks, matching
  specialist models, with applications in drug discovery, protein design, material
  engineering, and RNA design. By Xia, Jin, Xie, and 75+ co-authors at Microsoft
  Research AI for Science.</p>
