description: >
  <p>"LoRA: Low-Rank Adaptation of Large Language Models." Freezes pre-trained weights
  and injects <strong>trainable low-rank decomposition matrices</strong> into each
  Transformer layer, reducing trainable parameters by 10,000x and GPU memory by 3x
  compared to full fine-tuning with no inference latency penalty.</p>

  <p>LoRA became the <strong>dominant parameter-efficient fine-tuning method</strong>,
  used by virtually every open-source model community (Alpaca-LoRA, QLoRA, etc.) and
  enabling fine-tuning of frontier models on consumer hardware. ICLR 2022. By Hu, Shen,
  Wallis et al. at Microsoft Research.</p>
