description: >
  <p>Scalable pipeline for curating LLM pretraining data from Common Crawl.
  Produces <strong>~3.17 trillion tokens</strong> across four data types:
  general web text, code, math, and QA. Pipeline has three modules:
  <strong>Collection</strong> (extraction and deduplication), <strong>Filtering</strong>
  (quality classifiers and heuristic rules), and <strong>Extraction</strong>
  (domain-specific parsers for code, math, and QA content from web pages).</p>

  <p>Open-sourced with full reproduction scripts. All datasets verified in scale
  and quality as comparable to Microsoft's internal pretraining data. By Chang, Cui,
  Dong, Huang, Wei et al. (Microsoft Research).</p>
