description: >
  <p><strong>14B parameter</strong> dense Transformer with emphasis on synthetic data
  for complex reasoning. Surpasses its teacher model on STEM benchmarks. Also released
  as Phi-4 Mini (3.8B, 128K context) and Phi-4 Reasoning (chain-of-thought, April 2025).</p>

  <p>Phi-4 Reasoning Plus achieved 78% on AIME 2025, beating QwQ-32B despite being less
  than half the size. AA Intelligence Index: <strong>10</strong>. MIT License.</p>
