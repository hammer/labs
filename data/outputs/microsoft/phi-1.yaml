description: >
  <p>"Textbooks Are All You Need." <strong>1.3B parameter</strong> code-focused model
  trained on high-quality "textbook-like" synthetic data. Achieved <strong>50.6% on
  HumanEval</strong> despite being orders of magnitude smaller than competitors.</p>

  <p>Phi-1 demonstrated that <strong>data quality matters more than data quantity</strong>
  for small models, launching the Phi series and influencing the industry's approach to
  synthetic data curation. By Gunasekar, Zhang, Anber et al. MIT License.</p>
