description: >
  <p>Microsoft's first major foundation model push, releasing <strong>three MAI
  models</strong> in Azure Foundry &mdash; a direct shot at OpenAI and Google
  dependencies. <strong>MAI-Transcribe-1</strong> (speech-to-text, 25 languages)
  ranks #1 by FLEURS in 11 core languages, beating Whisper-large-v3 and Gemini 3.1
  Flash-Lite. <strong>MAI-Voice-1</strong> (text-to-speech) generates 60 seconds of
  audio in under 1 second on a single GPU. <strong>MAI-Image-2</strong> (text-to-image)
  debuted #3 on Arena.ai's image leaderboard.</p>

  <p>Marks Microsoft's transition from pure OpenAI dependency to building its own
  frontier multimodal models internally under VP GenAI Mustafa Suleyman's MAI division.
  Proprietary, available via Azure Foundry.</p>
