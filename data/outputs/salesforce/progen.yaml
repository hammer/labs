description: >
  <p>Protein language model. <strong>1.2B parameter</strong> autoregressive Transformer
  trained on 280M protein sequences conditioned on taxonomic and functional annotations.
  Generates functional protein sequences from natural language-like controls.</p>

  <p>Published in <strong>Nature Biotechnology</strong> (2023). Generated artificial
  proteins that were experimentally validated as functional. One of the earliest examples
  of large language models applied to protein engineering. By Madani, Krause et al.</p>
