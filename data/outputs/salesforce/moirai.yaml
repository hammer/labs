description: >
  <p>Time series foundation model. 14M, 91M, and 311M parameter variants trained on
  the LOTSA dataset (27B observations from 9 domains). Uses <strong>any-variate attention
  </strong> and multiple input/output projections for universal forecasting.</p>

  <p><strong>#1 on GIFT-Eval leaderboard</strong> for time series forecasting. ICML 2024.
  Moirai 2.0 (2025) switched to decoder-only architecture. By Woo, Liu, Kumar et al.
  Apache 2.0.</p>
