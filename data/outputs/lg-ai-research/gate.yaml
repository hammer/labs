description: >
  Geometrically Aligned Transfer Encoder for generalizable materials
  discovery. Jointly learns 34 physicochemical properties in a shared
  geometric space. Used to screen billions of candidate molecules for
  immersion cooling fluids, identifying 90,000+ promising candidates
  with experimental validation outperforming commercial coolants.
