description: >
  <p>LG AI Research's <strong>first open-weight vision-language model</strong>. Integrates
  a 1.2B vision encoder with the <a href="/outputs/lg-ai-research/exaone-4.0">EXAONE
  4.0</a> 32B LLM via native multimodal pretraining. Supports <strong>256K token
  context</strong> for long-document and enterprise-scale deployments. Trained with
  emphasis on document-centric corpora aligned with LG's industrial applications.</p>

  <p>Outperforms state-of-the-art models of similar scale on <strong>document
  understanding</strong> and <strong>Korean contextual reasoning</strong>.
  Achieves 77.3 average across STEM benchmarks, 81.4 on LiveCodeBench v6, 62.2 on
  ChartQA Pro. Open weights released.</p>
