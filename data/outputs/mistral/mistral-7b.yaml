description: >
  <p>Mistral's debut model and a landmark in efficient open-weight LLMs.
  7.3B dense parameters with two key innovations: <strong>Grouped-Query
  Attention (GQA)</strong> for faster inference and <strong>Sliding Window
  Attention (SWA)</strong> for efficient long-context handling. 32K context.</p>

  <p>Outperformed Llama 2 13B on all benchmarks and Llama 1 34B on
  reasoning, math, and code. MMLU: 60.1%, HellaSwag: 84.0%. Apache 2.0.
  Spawned an enormous ecosystem of fine-tunes and derivatives across the
  open-source community.</p>
