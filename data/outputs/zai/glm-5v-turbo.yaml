description: >
  <p>Z.ai's first <strong>native multimodal agent foundation model</strong>,
  built for vision-based coding and agentic workflows. Natively processes
  images, videos, design drafts, and complex document layouts as primary
  training data. 744B MoE with 40B active parameters per token, trained
  on 28.5T tokens. 200K context window, 131K max output.</p>

  <p>Optimized for the <strong>perceive &rarr; plan &rarr; execute</strong>
  loop in autonomous environments. Deeply integrated with OpenClaw and
  Claude Code workflows. Outperforms Claude Opus 4.5 on agentic browsing
  (BrowseComp) while trailing by 3.1 points on SWE-bench coding.
  AA Intelligence Index: 43 (reasoning).</p>
