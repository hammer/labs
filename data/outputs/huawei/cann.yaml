description: >
  Compute Architecture for Neural Networks -- Huawei's heterogeneous
  computing architecture for Ascend AI chips, analogous to NVIDIA's CUDA.
  After seven years of development, CANN was open-sourced in August 2025
  as part of Huawei's Ascend ecosystem strategy. Provides compiler and
  virtual instruction set interfaces for computing optimisation,
  communication efficiency, and memory management across AI training
  and deployment.
