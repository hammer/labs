name: TinyBERT
slug: tinybert
lab: huawei
date: 2019-09-23
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/1909.10351
  - label: "Published: Findings of EMNLP 2020"
    url: https://aclanthology.org/2020.findings-emnlp.372/
  - label: GitHub
