description: >
  Open benchmarking framework for click-through rate prediction and
  recommender systems. FuxiCTR (CIKM 2021) ran 4,600+ experiments over
  12,000 GPU hours to benchmark 24 CTR models. BARS (SIGIR 2022) expanded
  to 8,000+ experiments benchmarking 70+ recommendation models on six
  datasets, establishing standardised evaluation for the field.
