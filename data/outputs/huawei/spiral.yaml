name: SPIRAL
slug: spiral
lab: huawei
date: 2022-01-25
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2201.10207
  - label: "Published: ICLR 2022"
    url: https://iclr.cc/virtual/2022/poster/6505
  - label: GitHub
    url: https://github.com/huawei-noah/Speech-Backbones
