name: PanGu-pi
slug: pangu-pi
lab: huawei
date: 2023-12-28
sources:
  - label: "Paper: PanGu-pi (arXiv)"
    url: https://arxiv.org/abs/2312.17276
  - label: "Paper: PanGu-pi Pro (arXiv)"
    url: https://arxiv.org/abs/2402.02791
  - label: GitHub
    url: https://github.com/huawei-noah/Pretrained-Language-Model
description: >
  Efficient LLM architecture addressing feature collapse via nonlinearity
  compensation. Introduces a series-based activation function in FFN and
  augmented shortcuts in MSA. PanGu-pi-7B achieves comparable performance
  with 10% inference speed-up. PanGu-pi Pro further optimizes for tiny
  language models (1B-1.5B), achieving 8.87-point average improvement
  through tokenizer compression, architecture tweaking, and parameter
  inheritance.
