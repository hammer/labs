description: >
  <p>Family of code LLMs: 3B, 8B, 20B, and <strong>34B parameters</strong>.
  Trained on <strong>3.5&ndash;4.5T tokens</strong> across 116 programming languages.
  Supports code generation, bug fixing, code explanation, and documentation.</p>

