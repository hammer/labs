description: >
  <p>IBM's most expansive Granite release: <strong>Language</strong> (3B/8B/30B
  base + instruct), <strong>Vision</strong> (4B LoRA on top of 3B for
  document/table/chart extraction), <strong>Speech</strong> (2B family for
  multilingual ASR + translation), <strong>Guardian</strong> (8B fine-tuned on
  the Granite 4.1 8B base for harm detection), and <strong>Embedding</strong>
  (Multilingual R2, two sizes, 200+ languages). All under
  <strong>Apache 2.0</strong>.</p>

  <p>The language models are dense decoder-only Transformers (GQA, RoPE, SwiGLU,
  RMSNorm) trained on <strong>~15T tokens</strong> with multi-stage pretraining;
  8B and 30B extend to <strong>512K context</strong> via staged extension with
  model merging (3B caps at 128K). Post-trained with SFT on ~4.1M curated samples
  and on-policy GRPO with DAPO loss. Granite 4.1 8B-Instruct matches or
  outperforms the previous Granite 4.0 32B MoE despite being a simpler dense
  model &mdash; training quality substituting for scale.</p>

  <p><strong>AA Intelligence Index: 15 (30B), 12 (8B), 9 (3B)</strong> &mdash;
  all three are above-median for open-weight non-reasoning models of similar
  size, and notably token-efficient relative to peers. Granite Speech 4.1 2B
  reports a 5.33% word-error rate (top of the OpenASR leaderboard). 8B vendor
  benchmarks: MMLU 73.84, BBH 80.51, GSM8K 92.49, HumanEval 85.37, MBPP 87.30,
  ArenaHard 68.98.</p>
