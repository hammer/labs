description: >
  <p>IBM's latest foundation model family: <strong>3B, 8B, and 30B</strong> dense
  decoder-only Transformers (GQA, RoPE, SwiGLU, RMSNorm) trained on <strong>~15T
  tokens</strong> with multi-stage pretraining and long-context extension to
  <strong>512K tokens</strong>. Post-trained with SFT on ~4.1M curated samples and
  RL via on-policy GRPO with DAPO loss. Granite 4.1 8B-Instruct matches or outperforms
  the previous <strong>Granite 4.0 32B MoE</strong> despite being a simpler dense
  model &mdash; demonstrating that training quality can substitute for scale.</p>

  <p>Also includes <strong>Granite Speech 4.1</strong> (ASR + translation),
  <strong>Granite Vision 4.1</strong> (table/chart extraction), <strong>Granite
  Guardian</strong> (harm detection), and embedding models. 8B benchmarks: MMLU 73.84,
  BBH 80.51, GSM8K 92.49, HumanEval 85.37, MBPP 87.30, ArenaHard 68.98. All models
  under <strong>Apache 2.0</strong>.</p>
