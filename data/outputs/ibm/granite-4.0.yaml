description: >
  <p>Novel <strong>hybrid Mamba-2/Transformer + MoE architecture</strong> achieving 70%
  less memory and 2x inference speed vs. dense Transformers. H-Small: 32B total / 9B
  active. H-Tiny: 7B / 1B active. Micro: 3B dense. Nano: 350M&ndash;1.5B (runs in
  browser). First open models with <strong>ISO 42001 certification</strong>.</p>

  <p>AA Intelligence Index v4.0: <strong>11</strong> (H-Small), 8 (Micro),
  8 (H 1B Nano). Apache 2.0. Earlier scores reported on AA's pre-v4 index
  (e.g. 23 for H-Small) were recalibrated downward when v4.0 launched its
  ten-evaluation composite in late 2025.</p>
