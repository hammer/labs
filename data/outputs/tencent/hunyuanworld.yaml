name: HunyuanWorld
slug: hunyuanworld
lab: tencent
date: 2025-07-27
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2507.21809
  - label: GitHub (World 1.0)
    url: https://github.com/Tencent-Hunyuan/HunyuanWorld-1.0
  - label: GitHub (HY-WorldPlay / World 1.5)
    url: https://github.com/Tencent-Hunyuan/HY-WorldPlay
  - label: HuggingFace (HY-WorldPlay)
    url: https://huggingface.co/tencent/HY-WorldPlay
description: >
  Open-source world generation model series. World 1.0 integrates panoramic
  visual generation and 3D reconstruction from text/image inputs. HY-World 1.5
  (WorldPlay) adds real-time interactive streaming at 24fps with Context
  Forcing distillation and WorldCompass RL post-training.
tags:
  - 3d
  - generation
  - embodied
  - open-weight
outputs:
  - name: HunyuanWorld 1.0
    type: model
    date: 2025-07-27
    sources:
      - label: Paper (arXiv)
        url: https://arxiv.org/abs/2507.21809
      - label: GitHub
        url: https://github.com/Tencent-Hunyuan/HunyuanWorld-1.0
    paper:
      arxiv: "2507.21809"
    description: >
      First open-source world model supporting immersive roaming, interaction,
      and simulation from text and image inputs.
  - name: HY-World 1.5 (WorldPlay)
    type: model
    date: 2025-12-17
    sources:
      - label: GitHub
        url: https://github.com/Tencent-Hunyuan/HY-WorldPlay
      - label: HuggingFace
        url: https://huggingface.co/tencent/HY-WorldPlay
    description: >
      Real-time interactive world model with streaming video diffusion at
      24fps. Introduces Context Forcing distillation and WorldCompass RL
      post-training framework.
  - name: HY-World 2.0
    type: model
    date: 2026-04-15
    sources:
      - label: Paper (arXiv)
        url: https://arxiv.org/abs/2604.14268
      - label: GitHub
        url: https://github.com/Tencent-Hunyuan/HY-World-2.0
    description: >
      Multi-modal world model that reconstructs, generates, and simulates 3D worlds
      from text, images, or video. Produces editable 3D Gaussian Splatting scenes
      directly usable in Unreal/Unity/Blender. Four-stage pipeline: HY-Pano 2.0
      (panorama generation), WorldStereo 2.0 (keyframe view generation), WorldMirror
      2.0 (feed-forward 3D prediction), and WorldLens (engine-agnostic rendering with
      IBL lighting). Performance comparable to closed-source Marble. Open weights
      and code.
    paper:
      arxiv: "2604.14268"
