name: PLaMo 2
slug: plamo-2
lab: pfn
type: model
date: 2025-09-08
flagship: true
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2509.04897
  - label: HuggingFace (8B)
