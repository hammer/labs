description: >
  <p>Open-weight Qwen3.6 family released under Apache 2.0. Two flagships:</p>

  <p><strong>Qwen3.6-27B</strong> (dense, 27B, 64 layers, hybrid gated DeltaNet +
  gated attention) achieves <strong>flagship-level coding in a dense model</strong>,
  outperforming the much larger Qwen3.5-397B-A17B on coding: SWE-bench Verified
  <strong>77.2</strong> (vs 76.2), Terminal-Bench 2.0 <strong>59.3</strong> (matching
  Claude Opus 4.5), SkillsBench 48.2 (vs 30.0). Hybrid thinking mode. 262K native
  context (extensible to 1M).</p>

  <p><strong>Qwen3.6-35B-A3B</strong> (MoE, 35B total / 3B active) delivers agentic
  coding power at dramatically lower compute. Both models support 262K context across
  201 languages. Part of Alibaba's dual open + closed strategy alongside the
  proprietary <a href="/outputs/alibaba/qwen3.6-plus">Qwen3.6-Plus</a> and
  Qwen3.6-Max-Preview.</p>
