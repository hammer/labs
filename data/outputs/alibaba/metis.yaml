description: >
  <p>Addresses when agentic multimodal models should use external tools versus
  relying on internal knowledge. Proposes <strong>HDPO (Hybrid Decoupled Policy
  Optimization)</strong>, which separates accuracy optimization from tool efficiency
  into independent channels &mdash; avoiding the single weighted-objective tradeoff
  that makes agents either tool-dependent or tool-avoidant.</p>

  <p>Uses a <strong>curriculum learning</strong> progression: agents first master task
  resolution, then develop self-reliance. The resulting <strong>Metis</strong> model
  reduces tool invocations by <strong>orders of magnitude</strong> while simultaneously
  improving reasoning accuracy. A practical contribution for making agentic systems
  cheaper and faster by eliminating unnecessary tool calls. By the Accio Team at
  Alibaba Group + HUST.</p>
