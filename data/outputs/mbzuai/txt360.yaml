description: >
  <p>First pretraining corpus to <strong>globally deduplicate 99 Common Crawl
  snapshots</strong> together with 14 high-quality data sources (FreeLaw, PG-19,
  etc.), producing <strong>~5T tokens</strong> of deduplicated text. An upsampling
  recipe creates a <strong>15T+ token training corpus</strong> that outperforms
  FineWeb 15T on several key metrics. The filtered variant
  <strong>TxT360-BestOfWeb</strong> applies the ProX document filter model +
  format scoring to retain ~22% of the highest-quality pages.</p>

  <p>Part of the <a href="https://www.llm360.ai/">LLM360</a> open-source initiative
  (MBZUAI + Petuum) focused on fully transparent LLM development. Used to train
  the K2 model family. By Tang, Ranjan, Pangarkar, Liang, Wang, Ma, Liu, and
  Xing (MBZUAI / LLM360).</p>
