description: >
  <p>70B dense general-reasoning model from <a href="/labs/mbzuai">MBZUAI's
  Institute of Foundation Models</a>, post-trained from
  <a href="/outputs/mbzuai/k2-v2">K2-V2 Instruct</a> via two-stage RLVR
  (Reinforcement Learning with Verifiable Rewards) on the improved Guru
  dataset. Released January 27, 2026 as the UAE's fully sovereign reasoning
  system &mdash; pre-training, post-training, weights, and reasoning data
  all open under Apache 2.0.</p>

  <p>AA Intelligence Index <strong>24</strong> (well above the 15 median
  for similar-size open-weight models) at a 262K-token context window.
  Improves on K2-V2 by 4 points on the Intelligence Index, with hallucination
  rate dropping from 89% to 52% and long-context reasoning from 33% to 53%.
  Tied for first place with K2-V2 and Olmo 3 on Artificial Analysis's
  Openness Index.</p>
