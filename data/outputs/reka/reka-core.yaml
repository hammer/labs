description: >
  <p>Series of natively multimodal models processing text, images, video, and audio.
  <strong>Core</strong> (67B), <strong>Flash</strong> (21B), and <strong>Edge</strong>
  (7B) trained from scratch by a team of ~50 ex-DeepMind researchers. Reka Flash 3
  (March 2025) is the latest open-weight variant.</p>

  <p>Core approaches frontier models on human evaluations while Flash achieves SOTA
  for its compute class. AA Intelligence Index: <strong>10</strong> (Flash 3, 21B).
  Apache 2.0 (Flash 3). By the Reka Team.</p>
