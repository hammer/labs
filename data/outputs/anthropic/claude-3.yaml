description: >
  <p>First Claude family with <strong>tiered model sizes</strong>: Opus (largest),
  Sonnet (balanced), and Haiku (fastest). All models support <strong>200K token
  context</strong> and multimodal vision input. Architecture and parameters undisclosed.</p>

  <p>Claude 3 Opus set new benchmarks for graduate-level reasoning (GPQA 50.4%),
  multilingual math (MGSM 90.7%), and was the first model to surpass GPT-4 on several
  evaluations. The tiered approach let users choose between intelligence, speed, and
  cost. AA Intelligence Index: 18 (Opus), 10 (Sonnet), 12 (Haiku). Proprietary.</p>
