description: >
  <p>Open protocol standardizing how AI models connect to external data sources
  and tools. Provides a universal interface for context integration, replacing
  fragmented custom connectors with a <strong>single standard adopted
  industry-wide</strong>.</p>

  <p>MCP was adopted by OpenAI, Google, and dozens of other providers, becoming the
  de facto standard for LLM-tool integration. MIT License.</p>
