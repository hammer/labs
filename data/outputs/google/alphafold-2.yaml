description: >
  <p>Solved protein structure prediction at <strong>atomic accuracy</strong>. Won CASP14
  with a median GDT score of 92.4 (next best: 73). Predicted structures for
  <strong>200M+ proteins</strong> (essentially all known proteins), made freely
  available via the AlphaFold Protein Structure Database.</p>

  <p>AlphaFold 2 is arguably the <strong>greatest scientific achievement of deep
  learning</strong>. Named Nature's "Method of the Year 2021." Won the
  <strong>2024 Nobel Prize in Chemistry</strong> for Demis Hassabis and John Jumper.
  ~43,000 citations. By Jumper, Evans et al. (DeepMind). Open-source code and weights.</p>
