description: >
  <p>Four-variant family released under <strong>Apache 2.0</strong> (a notable license
  upgrade from prior Gemma releases). Includes a 31B dense flagship, 26B-A4B MoE
  (4B active), and edge variants E4B and E2B. <strong>256K token context</strong>
  for the larger models. Multimodal: text, image, video, audio.</p>

  <p>Architecture features alternating attention, dual RoPE, Per-Layer Embeddings (PLE),
  and shared KV cache. Gemma 4 31B achieves <strong>85.2% MMLU Pro, 89.2% AIME 2026,
  80.0% LiveCodeBench v6</strong>, and Codeforces Elo 2,150. Ranked #3 open model on
  Arena AI text leaderboard. Crossed 2M downloads shortly after release.</p>
