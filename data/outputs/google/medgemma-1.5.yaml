description: >
  <p><strong>4B-parameter medical multimodal model</strong> built on Gemma 3,
  trained for medical text and image comprehension. MedGemma 1.5 expands to
  high-dimensional medical imaging: <strong>CT/MRI volumes</strong> (3D),
  <strong>whole-slide histopathology</strong>, <strong>anatomical bounding-box
  localization</strong> on radiographs, and <strong>multi-timepoint chest X-ray
  analysis</strong> with prior image context. Also improves clinical document
  understanding (lab reports, EHRs).</p>

  <p>Over MedGemma 1.0: <strong>+11% 3D MRI classification</strong>,
  <strong>+47% macro F1 on whole-slide pathology</strong>, +35% chest X-ray
  localization IoU, +22% EHR QA accuracy, +18% lab report extraction F1.
  Part of Google's <a
  href="https://developers.google.com/health-ai-developer-foundations">Health
  AI Developer Foundations</a>. Open weights on HuggingFace (terms of use
  required).</p>
