description: >
  <p>First Gemini family: Ultra, Pro, and Nano tiers. <strong>Natively multimodal</strong>
  (text, image, audio, video). 32K token context. Ultra was the first model to surpass
  human-expert performance on MMLU (90.0%). Nano variants (1.8B, 3.25B) designed for
  on-device deployment.</p>

  <p>Gemini 1.0 Ultra achieved SOTA on 30 of 32 academic benchmarks. Architecture
  details undisclosed (parameter count not published). AA Intelligence Index: 10 (Ultra).
  Proprietary.</p>
