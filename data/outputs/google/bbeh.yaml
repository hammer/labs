description: >
  <p>Successor to <strong>BIG-Bench Hard (BBH)</strong>, replacing its 23 saturated
  tasks with much harder variants designed to resist frontier model capabilities.
  Harmonic mean accuracy: <strong>9.8% (best general model)</strong>, 44.8% (best
  reasoning model) &mdash; vs. BBH where frontier models scored >90%. Tasks span
  logical deduction, causal reasoning, spatial understanding, and multi-step
  inference.</p>

  <p>Rapidly adopted as the BBH successor in eval suites. ACL 2025. By Google
  DeepMind. The original <a href="https://arxiv.org/abs/2206.04615">BIG-Bench</a>
  (2022, 204 tasks, 444 authors from 132 institutions) was one of the most
  influential multi-task evaluation efforts; BBEH preserves its spirit while
  restoring discriminative power.</p>
