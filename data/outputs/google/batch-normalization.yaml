description: >
  <p>"Batch Normalization: Accelerating Deep Network Training by Reducing Internal
  Covariate Shift." Normalizes layer inputs during training, enabling much higher
  learning rates and reducing sensitivity to initialization. Achieves same accuracy
  with <strong>14x fewer training steps</strong>.</p>

  <p>Became a <strong>standard component in virtually all deep neural networks</strong>.
  One of the most-cited papers in deep learning (~50K+ citations). ICML 2015.
  By Ioffe and Szegedy.</p>
