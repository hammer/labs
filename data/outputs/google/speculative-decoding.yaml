description: >
  <p>"Fast Inference from Transformers via Speculative Decoding." Uses a small draft
  model to propose tokens verified in parallel by the large model, achieving
  <strong>2&ndash;3x speedup with mathematically identical outputs</strong>.</p>

  <p>Now a <strong>standard inference optimization</strong> used by virtually every LLM
  serving system (vLLM, TGI, TensorRT-LLM). ICML 2023. By Leviathan, Kalman, and
  Matias.</p>
