description: >
  <p>"Solving Olympiad Geometry without Human Demonstrations." Neuro-symbolic system
  that solves IMO geometry problems at <strong>near-gold-medal level</strong> (25 of
  30 problems). A language model guides a symbolic deduction engine, trained on 100
  million synthetic theorems without human demonstrations.</p>

  <p>Nature 2024. AlphaGeometry 2 (2025) further improved performance. By Trinh, Wu,
  Le, He, and Luong (DeepMind).</p>
