description: >
  <p>ML-based weather forecasting using graph neural networks. 10-day forecasts at
  0.25° resolution in <strong>under 1 minute on a single TPU v4</strong>. Outperformed
  ECMWF HRES (the gold standard) on 90% of 1,380 verification targets.</p>

  <p>Better tropical cyclone, atmospheric river, and extreme temperature prediction
  than traditional numerical weather models. Science 2023. By Lam et al. (DeepMind).
  Open-source.</p>
