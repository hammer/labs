description: >
  <p>Introduced <strong>knowledge distillation</strong>: compressing a large "teacher"
  model into a smaller "student" by training on the teacher's soft probability
  distributions rather than hard labels. The softened outputs transfer dark knowledge
  about inter-class similarities.</p>

  <p>Now a <strong>universal technique</strong> used across frontier labs for model
  compression, efficient deployment, and training smaller models (GPT-4o mini, Gemma,
  DeepSeek). By Hinton, Vinyals, and Dean.</p>
