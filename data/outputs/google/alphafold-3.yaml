description: >
  <p>Diffusion-based architecture predicting joint structures of proteins with DNA, RNA,
  small molecules, and ions. <strong>50%+ improvement</strong> over existing methods for
  protein-molecule interactions. Extends AlphaFold from protein-only to the full
  biomolecular landscape.</p>

  <p>Code and weights released for academic use (November 2024, publicly February 2025).
  Nature 2024. By Abramson et al. (DeepMind / Isomorphic Labs).</p>
