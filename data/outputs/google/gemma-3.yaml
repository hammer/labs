description: >
  <p>First <strong>multimodal Gemma</strong> (vision + text). 128K token context (4B+).
  140+ languages. Distilled training from larger Gemini models. Gemma-3-4B competitive
  with Gemma-2-27B; Gemma-3-27B comparable to Gemini 1.5 Pro.</p>

  <p>Sizes: 270M, 1B, 4B, 12B, 27B. The 27B variant became one of the most popular
  open models for fine-tuning and deployment. Apache 2.0.</p>
