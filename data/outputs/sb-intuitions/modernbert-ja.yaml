description: >
  <p>Japanese adaptation of the <a href="https://arxiv.org/abs/2412.13663">ModernBERT</a>
  encoder (Warner et al., 2024) in three sizes: <strong>30M</strong>, <strong>130M</strong>,
  and <strong>310M</strong>. Released February&ndash;May 2025 under the MIT license.
  The 30M variant is SB Intuitions' most-downloaded model by a wide margin
  (<strong>24K+ monthly downloads</strong> on HuggingFace), reflecting demand for efficient
  Japanese encoder models in retrieval, classification, and embedding use cases where a
  small encoder is preferred over a decoder LLM.</p>
