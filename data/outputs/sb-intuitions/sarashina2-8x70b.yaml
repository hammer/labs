description: >
  <p>~<strong>465B-total-parameter Mixture-of-Experts</strong> Japanese LLM, built by
  <strong>sparse upcycling</strong> (<a href="https://arxiv.org/abs/2212.05055">Komatsuzaki
  et al., 2022</a>) from <a href="/outputs/sb-intuitions/sarashina2">Sarashina2-70B</a>:
  8 experts of 70B parameters each. First publicly available 400B-class Japanese LLM,
  framed as a contribution to Japanese academia and industry. Requires 16&times; H100 or
  A100-80GB GPUs for BF16 inference. Released under the Sarashina Model NonCommercial
  License.</p>

  <p>Scaling decisions were informed by SB Intuitions' concurrent scaling-laws work on
  upcycling (<a href="/outputs/sb-intuitions/scaling-laws-upcycling-moe">Liew et al.,
  ICML 2025</a>), which identifies the regime in which converting a dense LLM into an
  MoE remains compute-efficient and where it saturates. Base model only &mdash; not
  instruction-tuned.</p>
