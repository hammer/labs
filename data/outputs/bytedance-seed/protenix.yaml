description: >
  An open-source, trainable reproduction of AlphaFold 3 (AF3) for biomolecular
  structure prediction. Protenix is designed to predict the 3D structures of
  complex systems containing proteins, DNA, RNA, small molecule ligands, and
  ions, achieving state-of-the-art accuracy under the Apache 2.0 license.
