description: >
  <p>Native multimodal <strong>audio-video joint generation</strong> model accepting four
  input modalities (text, image, audio, video) and producing 4&ndash;15 second clips at
  480p and 720p with synchronized audio. Supports <strong>multi-reference composition</strong>:
  up to 3 video clips, 9 images, and 3 audio clips in a single generation, enabling
  multi-shot narrative storytelling. Also released as a <strong>Fast variant</strong> for
  low-latency scenarios.</p>

  <p>Uses a unified large-scale architecture for joint audio-visual generation. Expert
  evaluations show performance on par with leading video generation models, with
  substantial improvements across all key sub-dimensions. Seedance 1.5 Pro (Dec 2025)
  introduced native audio-visual joint generation; 2.0 generalizes this to full
  multi-modal multi-reference control.</p>
