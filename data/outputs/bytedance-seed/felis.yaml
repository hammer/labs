description: >
  Felis is an open-source, automated, and scalable toolkit designed for high-throughput
  Absolute Binding Free Energy (ABFE) calculations. Paired with ByteFF, Felis achieves
  ranking performance comparable to state-of-the-art relative binding free energy (RBFE)
  methods.
