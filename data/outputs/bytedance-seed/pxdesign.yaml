description: >
  A generative protein binder design suite featuring diffusion-based 
  backbone generation (PXDesign-d) and hallucination-based methods 
  (PXDesign-h). Validated with wet-lab experiments, PXDesign achieved hit 
  rates of 17-82% for various targets, significantly accelerating the 
  discovery of high-affinity protein binders.
