description: >
  <p>"Evidence From Competitive Programming." Empirically demonstrates a
  <strong>log-linear relationship</strong> between accuracy and the number of reasoning
  tokens generated during test-time compute scaling, validated on competitive programming
  benchmarks.</p>

  <p>Combines reinforcement learning with parallel thinking to push the reasoning
  frontier. By Zhang, Guo, Ren, Chen, Ding, Xin, and Xiao (ByteDance Seed + Princeton,
  UC Berkeley, Stanford).</p>
