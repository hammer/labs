description: >
  <p>7B hybrid reasoning model (Transformer + Mamba-2 parallel heads).
  Trained via SFT on 3.1M samples + GRPO RL. 256K context, up to
  48K response tokens. Introduces <strong>DeepConf@512</strong>
  test-time scaling: AIME25 reaches 96.7% with 38% fewer tokens.</p>

  <p>AIME24: 88.1%, AIME25: 83.1%, MATH500: 97.4%, LiveCodeBench-v6:
  68.6%, GPQA-Diamond: 61.3%. AA Intelligence Index: 16. CC BY 4.0.</p>
