description: >
  <p>Original Falcon series. Dense causal Transformers with multi-query
  attention, RoPE, FlashAttention. Trained primarily on
  <a href="https://arxiv.org/abs/2306.01116">RefinedWeb</a> (5T token
  open web corpus). Falcon-180B (3,500B tokens, 4,096 A100s) was the
  largest open-weight model at launch.</p>

  <p>Falcon-7B: 1,500B tokens, 384 A100s. Falcon-40B: 1,000B tokens.
  All Apache 2.0 (180B under TII License).</p>
