      parameters: 1B
    - name: Falcon3-3B
      parameters: 3B
    - name: Falcon3-7B
      parameters: 7B
    - name: Falcon3-10B
      parameters: 10B
    - name: Falcon3-Mamba-7B
      parameters: 7B
      notes: Pure Mamba SSM
