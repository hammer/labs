description: >
  <p>Compute-efficient bilingual (Korean/English) LLMs. Dense
  Transformers at 2.1B (Nano), 9.8B (Essence), and 32.5B (Flag),
  all trained on <strong>3T tokens</strong> in two stages. Uses
  depth up-scaling, pruning, and distillation. EMNLP 2025 Oral.</p>

  <p>Flag 32.5B base: MMLU 77.68, KMMLU 62.10, HumanEval 51.22.
  CC-BY-NC-4.0 (Nano), custom license (others).</p>
