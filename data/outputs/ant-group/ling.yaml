    model:
      architecture: dense
      parameters: 16B
  - name: Ling-1T
    type: model
    date: 2025-10-09
    sources:
      - label: Announcement
        url: https://www.businesswire.com/news/home/20251009240721/en/Ant-Group-Unveils-Ling-AI-Model-Family-and-Launches-Trillion-Parameter-Language-Model-Ling-1T
      - label: HuggingFace
        url: https://huggingface.co/inclusionAI/Ling-1T
    description: >
