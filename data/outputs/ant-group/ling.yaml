      of billions to 1T parameters.
    paper:
      arxiv: "2510.22115"
  - name: Ling-2.5-1T
    type: model
    date: 2026-02-16
    sources:
      - label: Announcement
        url: https://www.businesswire.com/news/home/20260215551663/en/Ant-Group-Releases-Ling-2.5-1T-and-Ring-2.5-1T-Evolving-Its-Open-Source-AI-Model-Family
      - label: HuggingFace
        url: https://huggingface.co/inclusionAI/Ling-2.5-1T
    description: >
      Latest Ling iteration featuring Lightning Linear Attention, supporting a
