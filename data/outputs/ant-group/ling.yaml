      Technical details on training massive MoE models without premium H100/A100
      clusters. Core philosophy behind Ant's efficient scaling approach.
    paper:
      arxiv: "2503.05139"
  - name: Ling-mini / Ling-Lite
    type: model
    date: 2025-09-10
    sources:
      - label: HuggingFace
        url: https://huggingface.co/inclusionAI/Ling-mini-2.0
      - label: Blog Post
        url: https://huggingface.co/blog/RichardBian/ling-mini-2-moe-release
    description: >
      Smaller Ling variants for edge and low-latency use cases. Ling-mini 2.0
