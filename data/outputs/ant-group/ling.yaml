    model:
      architecture: moe
      parameters: 1T
      active_parameters: 50B
  - name: "Ling 2.0: Every Activation Boosted"
    type: paper
    date: 2025-10-25
    sources:
      - label: Paper (arXiv)
        url: https://arxiv.org/abs/2510.22115
      - label: HuggingFace
        url: https://huggingface.co/papers/2510.22115
    description: >
