description: >
  Open-source end-to-end audio large language model integrating speech
  understanding and generation for real-time bilingual Chinese-English dialogue.
  Uses multi-codebook discretization at 12.5 Hz frame rate to retain both
  semantic and acoustic information. Achieves 3.2% WER on Fleurs zh test set,
  significantly outperforming Whisper-large-v3 (12.4%). Includes the
  OpenAudio-Bench evaluation benchmark.
