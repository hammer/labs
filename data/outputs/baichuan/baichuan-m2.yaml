description: >
  Medical-enhanced reasoning model built upon Qwen2.5-32B with an innovative
  Large Verifier System comprising a Patient Simulator and Clinical Rubrics
  Generator. Trained through multi-stage reinforcement learning with improved
  GRPO. Outperforms all other open-source models and most closed-source
  counterparts on HealthBench. Licensed under Apache 2.0.
