name: Baichuan-Omni
slug: baichuan-omni
lab: baichuan
date: 2024-10-11
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2410.08565
  - label: GitHub
    url: https://github.com/westlake-baichuan-mllm/bc-omni
description: >
  First open-source 7B omni-modal large language model capable of concurrently
  processing and analyzing image, video, audio, and text modalities. Uses a
  two-stage training schema with multimodal alignment and multitask fine-tuning.
  Developed in collaboration with Westlake University and Zhejiang University.
