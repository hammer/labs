description: >
  Second generation of open-source large language models with 7B and 13B
  parameters, trained from scratch on 2.6 trillion tokens. Matches or outperforms
  other open-source models of similar size on benchmarks including MMLU, CMMLU,
  GSM8K, and HumanEval, with particular strength in medicine and law domains.
