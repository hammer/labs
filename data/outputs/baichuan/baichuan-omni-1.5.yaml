description: >
  End-to-end trained omni-modal model supporting text, image, video, and audio
  input with text and audio output. Built upon Qwen2.5-7B, uses a custom audio
  tokenizer (Baichuan-Audio-Tokenizer) and a multi-stage training strategy with
  approximately 500B high-quality tokens. Leads contemporary models including
  GPT-4o-mini in omni-modal capabilities and achieves results comparable to
  Qwen2-VL-72B on multimodal medical benchmarks.
