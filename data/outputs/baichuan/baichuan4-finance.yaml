    url: https://arxiv.org/abs/2412.15270
  - label: Announcement (TechNode)
    url: https://technode.com/2024/12/24/baichuan-ai-launches-enhanced-financial-model-surpassing-gpt-4o-accuracy/
description: >
  Financial domain-specific model built upon Baichuan4-Turbo using continual
  pre-training with a novel domain self-constraint training strategy. Integrates
  over 100 billion pieces of bilingual financial knowledge, developed in
  collaboration with Renmin University. Surpasses GPT-4o in financial task
  accuracy after SFT and RLHF/RLAIF.
