name: Baichuan-M1
slug: baichuan-m1
lab: baichuan
date: 2025-01-24
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2502.12671
  - label: HuggingFace (Base)
    url: https://huggingface.co/baichuan-inc/Baichuan-M1-14B-Base
  - label: HuggingFace (Instruct)
    url: https://huggingface.co/baichuan-inc/Baichuan-M1-14B-Instruct
description: >
  First open-source large language model developed from scratch for medical
  applications. Trained on 20 trillion tokens of both general and
  medical-specific data using a hybrid tokenizer, curriculum-based training
  strategy with progressive data complexity, and adaptive gradient clipping.
  The 14B Instruct variant surpasses Qwen2.5-72B-Instruct in medicine.
  Released alongside the Baichuan-M1-preview deep thinking model.
tags:
  - open-weight
  - biology
  - nlp
