description: >
  <p>DeepSeek's most powerful model family and the <strong>first frontier-scale model
  trained entirely on Huawei Ascend 950PR chips</strong> &mdash; zero NVIDIA/CUDA
  dependency anywhere in the stack. Two variants: <strong>V4-Pro</strong> (1.6T total /
  49B active MoE) and <strong>V4-Flash</strong> (284B total / 13B active MoE). Both
  support <strong>1M token context</strong>. Pre-trained on <strong>32T+ tokens</strong>
  with FP8 mixed precision (Pro) and FP4+FP8 (post-training).</p>

  <p>Key architectural innovations: <strong>Hybrid Attention</strong> combining
  Compressed Sparse Attention (CSA) + Heavily Compressed Attention (HCA), requiring
  only <strong>27% of inference FLOPs and 10% of KV cache</strong> vs. V3.2.
  <strong>Manifold-Constrained Hyper-Connections (mHC)</strong> for stable deep signal
  propagation. <strong>Muon optimizer</strong> for training stability. Three reasoning
  modes: Non-think, Think High, and Think Max (384K+ context optimal).</p>

  <p>V4-Pro-Max benchmarks: LiveCodeBench <strong>93.5%</strong> (#1),
  Codeforces Rating <strong>3206</strong> (vs. GPT-5.4: 3168), IMOAnswerBench
  <strong>89.8%</strong> (vs. Opus 4.6 Max: 75.3%), SWE-bench Verified
  <strong>80.6%</strong>. Base model: MMLU 90.1%, C-Eval 93.1%, GSM8K 92.6%.
  Post-training uses two-stage pipeline: domain-specific expert cultivation (SFT +
  GRPO) then unified on-policy distillation. MIT License.</p>
