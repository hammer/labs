description: >
  <p>Efficient foundation models using a hybrid backbone combining <strong>gated short
  convolutions with grouped query attention</strong>. 350M to 24B parameters (MoE,
  2.3B active). Optimized for edge and on-device deployment.</p>

  <p>LFM2-24B achieves 239 tok/s (#3 speed ranking on AA). Also includes vision-language
  (LFM2.5-VL), speech, and pharmaceutical variants (with Insilico Medicine). AA
  Intelligence Index: <strong>10</strong> (24B). Apache 2.0.</p>
