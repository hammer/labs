name: Qwen3
slug: qwen3
lab: alibaba-qwen
date: 2025-04-29
sources:
  - label: Blog Post
    url: https://qwenlm.github.io/blog/qwen3/
  - label: GitHub
    url: https://github.com/QwenLM/Qwen3
description: >
  Third generation of the Qwen model family. Introduced a massive 36-trillion
  token pretraining dataset. Includes dense, MoE, multimodal, speech, and
  reasoning models.
tags:
  - open-weight
  - moe
  - multilingual
  - multimodal
  - reasoning
outputs:
  - name: Qwen3
    type: model
    date: 2025-04-29
    sources:
      - label: Blog Post
        url: https://qwenlm.github.io/blog/qwen3/
      - label: GitHub
        url: https://github.com/QwenLM/Qwen3
    description: >
      Dense: 0.6B, 1.7B, 4B, 8B, 14B, 32B. MoE: 30B-A3B and flagship 235B-A22B.
    model:
      variants:
        - name: Qwen3-0.6B
          parameters: 0.6B
        - name: Qwen3-1.7B
          parameters: 1.7B
        - name: Qwen3-4B
          parameters: 4B
        - name: Qwen3-8B
          parameters: 8B
        - name: Qwen3-14B
          parameters: 14B
        - name: Qwen3-32B
          parameters: 32B
        - name: Qwen3-30B-A3B
          parameters: 30B
          active_parameters: 3B
          notes: MoE
        - name: Qwen3-235B-A22B
          parameters: 235B
          active_parameters: 22B
          notes: MoE flagship
  - name: Qwen3 Technical Report
    type: paper
    date: 2025-05-14
    sources:
      - label: "Paper (arXiv)"
        url: https://arxiv.org/abs/2505.09388
    description: >
      Hybrid reasoning architecture. 6 dense models (0.6B, 1.7B, 4B, 8B, 14B, 32B)
      and 2 MoE models (30B-A3B, 235B-A22B).
    paper:
      arxiv: "2505.09388"
  - name: Qwen3-Max
    type: model
    date: 2025-09-05
    sources:
      - label: Announcement
        url: https://qwen.ai/blog?id=87dc93fc8a590dc718c77e1f6e84c07b474f6c5a
    description: >
      First open-weight trillion-parameter scale model from Qwen.
    model:
      architecture: moe
  - name: Qwen3-Next
    type: model
    date: 2025-09-10
    sources:
      - label: Blog Post
        url: https://qwen.ai/blog?id=4074cca80393150c248e508aa62983f9cb7d27cd
      - label: GitHub
        url: https://github.com/QwenLM/Qwen-Agent
    description: >
      80B-A3B base model with Instruct and Thinking fine-tuned variants.
    model:
      architecture: moe
      parameters: 80B
      active_parameters: 3B
      variants:
        - name: Qwen3-Next-80B-A3B-Base
          parameters: 80B
          active_parameters: 3B
        - name: Qwen3-Next-80B-A3B-Instruct
          parameters: 80B
          active_parameters: 3B
        - name: Qwen3-Next-80B-A3B-Thinking
          parameters: 80B
          active_parameters: 3B
  - name: Qwen3-Omni
    type: model
    date: 2025-09-22
    sources:
      - label: "Paper (arXiv)"
        url: https://arxiv.org/abs/2509.17765
    description: >
      Unified multimodal model (text, image, audio, video). Thinker-Talker MoE
      architecture. SOTA on 32/36 audio benchmarks.
    model:
      architecture: moe
    paper:
      arxiv: "2509.17765"
  - name: Qwen3-VL Technical Report
    type: paper
    date: 2025-11-26
    sources:
      - label: "Paper (arXiv)"
        url: https://arxiv.org/abs/2511.21631
    description: >
      Dense (2B-32B) and MoE (30B-A3B, 235B-A22B) vision-language models with
      256K native context.
    paper:
      arxiv: "2511.21631"
  - name: Qwen3-TTS
    type: model
    date: 2026-01-22
    sources:
      - label: "Paper (arXiv)"
        url: https://arxiv.org/abs/2601.15621
    description: >
      Multilingual TTS with 3-second voice cloning. Trained on 5M+ hours, 10 languages.
    paper:
      arxiv: "2601.15621"
  - name: Qwen3-Max-Thinking
    type: model
    date: 2026-01-27
    sources:
      - label: Blog Post
        url: https://qwen.ai/blog?id=qwen3-max-thinking
    description: API-only reasoning model.
    model:
      architecture: moe
    notes: "Parameter count unconfirmed: estimated 1T total, 22B active"
  - name: Qwen3-ASR & ForcedAligner
    type: model
    date: 2026-01-29
    sources:
      - label: "Paper (arXiv)"
        url: https://arxiv.org/abs/2601.21337
    description: >
      Speech recognition for 52 languages. Includes forced alignment model.
      SOTA among open-source ASR.
    paper:
      arxiv: "2601.21337"
