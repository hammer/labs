description: >
  Planning-oriented end-to-end autonomous driving framework unifying
  perception, prediction, and planning in one network. Won the CVPR 2023
  Best Paper Award. Surpasses prior methods by 20% in tracking, 30% in
  mapping, 38% in motion forecasting, and 28% in planning on nuScenes.
  Uses multi-view camera only, outperforming LiDAR-based methods.
