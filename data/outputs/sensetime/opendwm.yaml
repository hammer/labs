description: >
  Open-source driving world model platform from SenseTime Research with
  training, inference, and evaluation tools. Features MaskGWM, a
  generalizable driving world model using video mask reconstruction with
  a scalable DiT structure. Supports long-horizon prediction and
  multi-view generation, validated on nuScenes, OpenDV-2K, and Waymo.
  Accepted at CVPR 2025.
