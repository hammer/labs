description: >
  World's first open-source decision intelligence platform, unveiled at
  WAIC 2021. DI-engine is the core generalized decision AI engine for
  PyTorch and JAX, supporting DQN, Rainbow, PPO, TD3, SAC, R2D2, IMPALA,
  multi-agent RL, imitation learning, offline RL, and model-based RL.
  Part of the OpenXLab ecosystem alongside OpenMMLab.
