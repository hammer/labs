description: >
  OpenMMLab is the most influential open-source computer vision algorithm
  ecosystem, co-created by SenseTime, CUHK MMLab, and Shanghai AI Lab.
  Since October 2018, has released 30+ vision libraries with 300+
  algorithms and 2000+ pretrained models. MMDetection, the flagship
  detection toolbox, supports object detection, instance segmentation,
  panoptic segmentation, and semi-supervised detection on PyTorch.
