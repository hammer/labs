description: >
  High-performance deep-learning inference engine developed by SenseTime.
  PPLNN (Primitive Library for Neural Network) supports ONNX models with
  optimized support for OpenMMLab frameworks. Includes custom
  high-performance operator libraries for cloud-native multi-backend
  deployment. Development began in 2015 as SenseTime's internal PPL
  toolkit before open-sourcing.
