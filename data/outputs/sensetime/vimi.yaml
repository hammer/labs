description: >
  World's first controllable character video generation model, launched
  at WAIC 2024 alongside SenseNova 5.5. Generates character videos from
  a single photo with precise facial and limb control. Supports multiple
  driving methods including video, animation, audio, and text. Stably
  produces single-shot videos up to one minute without quality
  degradation. Consumer app "Vimi Camera" also launched.
