description: >
  <p>Foundation model for image segmentation. Trained on <strong>SA-1B</strong>, the
  largest segmentation dataset ever (1B+ masks on 11M images). Uses a promptable
  architecture: given points, boxes, or text, SAM generates high-quality segmentation
  masks in real-time.</p>

  <p>SAM established the <strong>"foundation model" paradigm for vision tasks</strong>,
  analogous to what GPT achieved for language. Extended by SAM 2 (2024) for video with
  streaming memory. ICCV 2023. 42K+ GitHub stars. By Kirillov et al. Apache 2.0.</p>
