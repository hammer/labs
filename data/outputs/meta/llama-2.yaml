description: >
  <p>7B, 13B, and <strong>70B parameter</strong> dense Transformers trained on 2T tokens.
  70B uses Grouped Query Attention (GQA). 4K token context. First Llama with
  <strong>commercial licensing</strong>. Chat variants fine-tuned with RLHF.</p>

  <p>Llama 2 was the first open-weight model with a permissive commercial license,
  enabling enterprise adoption at scale. The 70B chat model was competitive with
  early GPT-3.5. AA Intelligence Index: 8 (70B). By Touvron et al.</p>
