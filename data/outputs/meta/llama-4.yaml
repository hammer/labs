description: >
  <p>First <strong>MoE Llama</strong>. Scout: 109B total / 17B active (16 experts),
  <strong>10M token context</strong>. Maverick: 400B total / 17B active (128 experts),
  1M context. Both natively multimodal (text + image). Trained with early-fusion
  architecture.</p>

  <p>Llama 4 was also the first multimodal Llama with built-in vision capabilities.
  Behemoth (~2T/288B active) was announced but delayed. AA Intelligence Index: 18
  (Maverick), 14 (Scout). Llama 4 Community License.</p>
