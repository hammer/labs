description: >
  <p>"Emerging Properties in Self-Supervised Vision Transformers." Self-distillation
  with <strong>no labels</strong>: a student network learns from a momentum-updated
  teacher. ViT-Base achieves 80.1% ImageNet top-1 without any labeled data.</p>

  <p>DINO showed that self-supervised ViTs develop explicit information about semantic
  segmentation in their attention maps. The approach was extended in
  <strong>DINOv2</strong> (2023) to produce all-purpose visual features from 142M curated
  images. ICCV 2021. By Caron, Touvron, Misra et al.</p>
