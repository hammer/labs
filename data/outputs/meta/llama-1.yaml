description: >
  <p>"LLaMA: Open and Efficient Foundation Language Models." Dense Transformers from 7B
  to <strong>65B parameters</strong> trained on publicly available data only. LLaMA-65B
  competitive with Chinchilla-70B and PaLM-540B; LLaMA-13B outperformed GPT-3 (175B)
  on most benchmarks.</p>

  <p>LLaMA proved that <strong>smaller models trained on more data</strong> (following
  Chinchilla scaling laws) could match much larger models, catalyzing an explosion of
  open-source fine-tuning (Alpaca, Vicuna, etc.) and establishing Meta as the leader
  of the open-weight movement. By Touvron et al.</p>
