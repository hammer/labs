description: >
  <p>Open-source deep learning framework featuring dynamic computation graphs (eager
  mode) and a Python-first design. <strong>87K+ GitHub stars</strong>. Transferred to
  the Linux Foundation (PyTorch Foundation) in September 2022.</p>

  <p>PyTorch became the <strong>dominant framework for AI research and production</strong>,
  used by virtually every frontier lab. Its eager execution model, autograd system, and
  ecosystem (TorchVision, TorchAudio, TorchServe) made it the standard for model
  development. BSD License.</p>
