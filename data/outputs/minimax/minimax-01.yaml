description: >
  <p>A 456B parameter MoE model series featuring a 4-million-token context window 
  and the <strong>Lightning Attention</strong> architecture. This work is highly 
  influential for its <strong>Batch Size Scaling (BSS)</strong> strategy, which 
  optimizes training by aligning the batch size with the <strong>Critical Batch Size 
  (CBS)</strong> derived from a power-law relationship with training loss. By starting 
  small (16M tokens) and scaling to 128M tokens in discrete steps, MiniMax-01 
  maximizes Model FLOPs Utilization (MFU) and training stability.</p>

  <p>This "fast catch-up" approach has become a 2026 industry standard, adopted by 
  models like <strong>Arcee Trinity Large</strong> and mathematically validated 
  in <a href="/outputs/meituan/optimal-batch-size-scheduling">Fast Catch-Up, Late Switching</a>.</p>
