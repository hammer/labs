description: >
  A 456B parameter MoE model series featuring a 4-million-token context window
  and the **Lightning Attention** architecture. This work is highly 
  influential for its **Batch Size Scaling (BSS)** strategy, which optimizes 
  training by aligning the batch size with the **Critical Batch Size (CBS)** 
  derived from a power-law relationship with training loss. By starting small 
  (16M tokens) and scaling to 128M tokens in discrete steps, MiniMax-01 
  maximizes Model FLOPs Utilization (MFU) and training stability. This 
  "fast catch-up" approach has become a 2026 industry standard, adopted by 
  models like **Arcee Trinity Large** and mathematically validated in 
  *Fast Catch-Up, Late Switching* (arXiv:2602.14208).
