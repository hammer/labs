    model:
      architecture: moe
      parameters: 456B
      context_window: 4000000
  - name: MiniMax-VL-01
    type: model
    date: 2025-01-15
    sources:
      - label: HuggingFace
        url: https://huggingface.co/MiniMaxAI/MiniMax-VL-01
      - label: GitHub
        url: https://github.com/MiniMax-AI/MiniMax-01
    description: >
      Vision-language model using ViT-MLP-LLM framework with 303M parameter
      ViT encoder and MiniMax-Text-01 as base LLM. Trained on 512B
