description: >
  <p><strong>314B parameter MoE</strong> (8 experts, 2 active per token, ~78B active).
  64 Transformer layers, 48 query attention heads, 8 KV heads (Grouped Query Attention).
  8,192 token context. Open-sourced under Apache 2.0 on March 17, 2024.</p>

  <p>First Grok model and one of the largest open-weight models at the time of release.
  GitHub repo reached <strong>51.5K stars</strong>. Originally released November 2023
  on the X platform, open-sourced four months later.</p>
