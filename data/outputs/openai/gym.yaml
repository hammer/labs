description: >
  <p>Toolkit for developing and comparing reinforcement learning algorithms. Provides a
  standard API for RL environments (CartPole, Atari, MuJoCo, etc.) that became the
  <strong>universal interface for RL research</strong>. 37K+ GitHub stars.</p>

  <p>Gym standardized how RL agents interact with environments, enabling reproducible
  benchmarking across the field. Now maintained by the Farama Foundation as
  <a href="https://github.com/Farama-Foundation/Gymnasium">Gymnasium</a>. MIT License.</p>
