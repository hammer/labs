description: >
  <p>"Improving Image Generation with Better Captions" &mdash; the third generation of
  DALL-E, integrated natively into ChatGPT. Key innovation is a <strong>captioning
  model</strong> that generates detailed, accurate descriptions of training images,
  dramatically improving text-image alignment.</p>

  <p>DALL-E 3 generates images that closely follow complex, detailed prompts without
  requiring prompt engineering. Users interact through natural conversation in ChatGPT
  rather than crafting specialized prompts. By Betker et al. Proprietary.</p>
