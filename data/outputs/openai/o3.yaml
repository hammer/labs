description: >
  <p>Second-generation reasoning model, advancing o1's test-time compute scaling.
  200K token context. Released alongside <strong>o4-mini</strong>, a smaller reasoning
  variant. o3-mini launched earlier (January 2025) as a cost-efficient option with
  selectable reasoning effort (low/medium/high).</p>

  <p>o3 achieved <strong>96.7% on AIME 2024</strong> and scored 87.7% on GPQA-Diamond.
  o3-pro (June 2025) used parallel test-time compute for the highest reasoning accuracy.
  AA Intelligence Index: 38 (o3), 26 (o3-mini), 33 (o4-mini), 41 (o3-pro). Proprietary.</p>
