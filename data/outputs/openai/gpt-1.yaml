description: >
  <p>"Improving Language Understanding by Generative Pre-Training" &mdash; the paper that
  launched the GPT series. A <strong>117M parameter</strong> decoder-only Transformer
  (12 layers, 768 hidden, 12 heads) pre-trained on BookCorpus with a causal language
  modeling objective, then fine-tuned for downstream tasks. 512 token context.</p>

  <p>Demonstrated that <strong>generative pre-training followed by discriminative
  fine-tuning</strong> could achieve strong results across diverse NLP tasks, establishing
  the paradigm that would scale to GPT-2, GPT-3, and beyond. By Radford, Narasimhan,
  Salimans, and Sutskever.</p>
