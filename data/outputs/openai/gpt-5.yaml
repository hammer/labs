description: >
  <p>Multi-component system combining a fast model, reasoning model, and router into a
  single interface. <strong>400K token context</strong>. Replaced GPT-4o, o3, o4-mini,
  and GPT-4.1 as the default ChatGPT model. Architecture undisclosed.</p>

  <p>GPT-5 unified fast inference and deep reasoning in one model, with variants spanning
  from nano (lightweight) to thinking-pro (maximum reasoning). AA Intelligence Index: 45.
  Proprietary.</p>
