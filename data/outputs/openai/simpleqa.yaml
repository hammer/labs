description: >
  <p><strong>4,326 short-form factuality questions</strong> adversarially collected
  against GPT-4 to measure factual recall and calibration. Questions are designed
  to have single, unambiguous, verifiable answers. Tests whether models know what
  they know &mdash; rewarding calibrated abstention over confident hallucination.</p>

  <p>Used in the <strong>Epoch Capabilities Index</strong> (as SimpleQA Verified).
  Complements Artificial Analysis' AA-Omniscience (which tests similar capabilities
  at larger scale with 6,000 questions). Still discriminative for frontier models.
  By OpenAI.</p>
