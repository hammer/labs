description: >
  <p>"Robust Speech Recognition via Large-Scale Weak Supervision" &mdash; an
  encoder-decoder Transformer trained on <strong>680,000 hours</strong> of multilingual
  audio data collected from the web. The largest variant (large-v3) has <strong>1.55B
  parameters</strong>. Supports transcription and translation across 99 languages.</p>

  <p>Whisper demonstrated that scaling weakly supervised pre-training on diverse audio
  data approaches human-level robustness without domain-specific fine-tuning. Became
  the <strong>most widely-used open-source speech recognition model</strong>, integrated
  into thousands of applications. ICML 2023. By Radford, Kim, Xu et al. MIT License.</p>
