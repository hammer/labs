  - label: Project Page
    url: https://research.nvidia.com/labs/lpr/climb/
description: >
  <p>Automated framework for discovering optimal pretraining data mixtures through
  <strong>semantic clustering and iterative optimization</strong>. Uses a proxy model
  to evaluate candidate mixtures, clusters data into 20 semantic groups, then searches
  for the ideal combination through iterative refinement &mdash; replacing manual
  data curation with a principled optimization loop.</p>

  <p>A 1B model trained on the optimized mixture (400B tokens) surpasses
  <strong>Llama-3.2-1B by 2.0%</strong>; domain-specific optimization yields
  5% gains over random sampling. Releases two datasets: <strong>Nemotron-ClimbLab</strong>
  (1.2T tokens, 20 semantic clusters for research) and <strong>Nemotron-ClimbMix</strong>
  (400B tokens, optimized mixture for efficient pretraining). NeurIPS 2025.</p>
