description: >
  <p>Hybrid Mamba-Transformer reasoning models (12B and 9B compressed
  via Minitron). Trained on 20T tokens in FP8. On par with Qwen3-8B on
  reasoning with up to 6x higher inference throughput. 128K context,
  fits on single A10G 22GB in BF16.</p>

  <p>Nemotron Nano V2 VL adds vision encoder for document understanding,
  long video comprehension, and reasoning. 35% higher throughput than
  predecessor on multi-page document tasks.</p>
