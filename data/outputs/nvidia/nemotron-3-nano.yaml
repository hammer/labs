description: >
  <p>First Nemotron 3 generation models. Hybrid <strong>LatentMoE +
  Mamba-2 + Attention</strong> architecture. The 30B-A3B variant has
  23 Mamba-2 layers + 23 MoE layers (128 routed + 1 shared expert,
  6 active) + 6 GQA attention layers. 30B total / 3.5B active.
  Trained on <strong>25T tokens</strong>. 1M context window.</p>

  <p>AIME25: 89.1 (no tools) / 99.2 (with tools), GPQA: 75.0 (tools),
  LiveCodeBench: 68.3, MMLU-Pro: 78.3, RULER@1M: 86.3. The 4B variant
  (compressed from 9B via structured pruning) fits on 8GB Jetson Orin
  Nano for edge deployment. MATH-500: 95.4 in reasoning mode.</p>
