description: >
  <p>First production-grade <strong>SSM-Transformer-MoE hybrid</strong> architecture.
  Interleaves Mamba state-space layers with Transformer attention layers, combined with
  mixture-of-experts routing. 256K token context. Fits on a single 80GB GPU despite
  its scale.</p>

  <p>The hybrid architecture achieves 2.5x faster inference than equivalent dense
  Transformers. Jamba 1.7 Large (398B total / 94B active) is the current variant.
  AA Intelligence Index: <strong>11</strong>. The Jamba architecture is a genuine
  contribution to the field &mdash; demonstrating that SSMs and attention are
  complementary, not competing. Apache 2.0 (Jamba v0.1). By Lieber, Lenz, Shoham et al.</p>
