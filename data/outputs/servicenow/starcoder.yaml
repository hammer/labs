description: >
  <p><strong>15.5B parameter</strong> code LLM trained on 80+ programming languages
  from The Stack (1T tokens). 8K token context with fill-in-the-middle. Part of the
  <strong>BigCode</strong> collaboration between ServiceNow and HuggingFace.</p>

  <p>StarCoder outperformed existing open code models and matched Codex on HumanEval.
  StarCoder2 (February 2024, 3B/7B/15B, 3.3&ndash;4.3T tokens) extended the series
  with NVIDIA, outperforming CodeLlama-34B. OpenRAIL-M License.</p>
