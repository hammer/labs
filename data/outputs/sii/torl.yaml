description: >
  <p>Framework for training LLMs to <strong>autonomously discover tool-use strategies
  via reinforcement learning</strong> rather than supervised fine-tuning. Models learn
  when and how to invoke computational tools (code execution, calculators) purely through
  reward-driven optimization, with no explicit instruction on tool-use patterns.</p>

  <p>Demonstrates <strong>emergent behaviors</strong>: strategic tool invocation,
  self-regulation of ineffective code, and adaptive switching between computational
  and analytical reasoning &mdash; all arising organically from RL training. ToRL-7B
  achieves <strong>43.3% on AIME 2024</strong>, outperforming RL without tools by
  14% and the best existing Tool-Integrated Reasoning model by 17%. Open-sourced
  with implementation, datasets, and models. By Xuefeng Li, Haoyang Zou, Pengfei Liu
  (SJTU + SII GAIR).</p>
