description: >
  <p>"Mercury: Ultra-Fast Language Models Based on Diffusion." Introduces
  <strong>diffusion-based LLMs (dLLMs)</strong> that forecast multiple tokens
  simultaneously via iterative denoising, rather than sequential autoregressive
  generation. Mercury Coder Mini achieves <strong>1,109 tokens/sec</strong> on H100.</p>

  <p>Mercury 2 (February 2026) adds reasoning capability with AA Intelligence Index
  <strong>33</strong> at ~929 tok/s &mdash; roughly 10x faster than comparable
  autoregressive models at similar quality. A genuinely novel architecture paradigm.
  By Khanna, Kharbanda, Li, Ermon, Grover, Kuleshov et al.</p>
