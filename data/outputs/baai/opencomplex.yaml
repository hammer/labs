description: >
  Open-source platform for biomolecular 3D structure prediction and
  conformational ensemble sampling. Part of BAAI's WuJie series focused on life
  science AI. OpenComplex provides trainable protein/RNA/complex prediction;
  OpenComplex2 extends to generative conformational ensemble sampling.
