description: >
  Open-source platform for end-to-end prediction of biomolecular 3D
  structures including protein, RNA, and protein-RNA complexes. Built on
  architectures of AlphaFold2 and AlphaFold-Multimer. Part of BAAI's
  WuJie series focused on life science AI. Provides a trainable PyTorch
  framework for developing protein, RNA, and complex models.
