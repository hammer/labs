description: >
  All-atom generative world model for all-to-all biomolecular interaction
  design. Allows scientists to specify epitopes on arbitrary targets and
  generate diverse classes of binding partners. Supports protein-binding
  protein design, protein-binding RNA/DNA, RNA/DNA-binding ligand design,
  and functional motif scaffolding. Extends beyond proteins to nucleic
  acid and small-molecule design for interaction types previously
  inaccessible to existing tools.
