description: >
  Next-generation embodied AI foundation model advancing general perception,
  spatial reasoning, and temporal modeling. Two major upgrades over 2.0:
  (1) Precise 3D Spatial Reasoning via depth-aware coordinate prediction
  instead of 2D pixel-relative grounding, generating complete 3D manipulation
  traces as ordered keypoint sequences under physical constraints.
  (2) Dense Temporal Value Estimation providing step-aware progress prediction
  and execution state understanding, producing stable feedback signals for
  VLA reinforcement learning. Achieves 95%+ task success rate in complex
  fine-grained manipulations with only one demonstration.
