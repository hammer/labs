description: >
  Emu3 research published in the main issue of Nature, demonstrating that
  multimodal models trained solely via next-token prediction can match
  task-specific methods across generation and perception. Shows coherent
  high-fidelity video generation, interleaved vision-language generation,
  and vision-language-action modelling for robotic manipulation. Second
  Chinese large model team (after DeepSeek) to publish in Nature, and
  China's first Nature paper on the multimodal large model route.
