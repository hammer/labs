description: >
  Tactile Hierarchical Dynamic dataset with 2.4M+ contact samples for
  embodied AI. ToucHD-Force collects 722,436 touch-force pairs using five
  tactile sensors and 71 distinct indenters. Enriches higher-tier dynamic
  tactile data for robot manipulation. Three sub-datasets cover force
  sensing, simulation, and manipulation tasks.
