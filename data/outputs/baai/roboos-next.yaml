description: >
  Unified memory-based framework for lifelong, scalable, and robust
  multi-robot collaboration. Introduces Spatio-Temporal-Embodiment Memory
  (STEM), integrating spatial scene geometry, temporal event history, and
  embodiment profiles into a shared representation. High-level brain model
  performs global planning by retrieving and updating STEM while low-level
  controllers execute actions locally. Enables dynamic task allocation,
  fault-tolerant collaboration, and consistent state synchronization.
  Tested across restaurants, supermarkets, and households with
  heterogeneous embodiments.
