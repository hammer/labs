description: >
  Next-generation vision-language model unifying embodied AI for advanced
  robotics. Announced at the 2025 BAAI Conference on June 6. Most powerful
  open-source embodied brain model, supporting spatial understanding
  (affordance prediction, spatial referring, trajectory forecasting) and
  temporal decision-making (closed-loop interaction, multi-agent planning,
  real-time scene memory). Available in 3B, 7B, and 32B parameter variants.
  The 32B model achieves leading results on spatial and temporal benchmarks,
  surpassing prior open-source and proprietary models.
