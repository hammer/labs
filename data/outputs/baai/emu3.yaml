description: >
  Native multimodal model trained solely via next-token prediction,
  demonstrating that a single architecture can match task-specific methods
  across generation and perception. Published in the main issue of Nature —
  the second Chinese large model team (after DeepSeek) to achieve this, and
  China's first Nature paper on the multimodal large model route.
