description: >
  Open-source protein representation learning framework using self-supervised
  sequence-structure collaborative learning. Features a robust structural
  encoder with distance encoding for direct information exchange between
  backbone atoms and relative position encoding (RPE) for rotational and
  translational invariance. Combines atomic-level and residue-level
  structural information. Uses masked token prediction and atom distance
  restoration for self-supervised learning. Published in Briefings in
  Bioinformatics.
