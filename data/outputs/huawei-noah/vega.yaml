description: >
  AutoML toolchain for neural architecture search, hyperparameter
  optimisation, data augmentation, and model training. Supports PyTorch,
  TensorFlow, and MindSpore backends with Ascend 910 and GPU acceleration.
  Includes algorithms for NAS (CARS, DARTS, GDAS), super-resolution (SR-EA),
  semantic segmentation, and detection.
