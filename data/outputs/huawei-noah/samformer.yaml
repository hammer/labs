    url: https://arxiv.org/abs/2402.10198
  - label: "Published: ICML 2024 (Oral)"
    url: https://icml.cc/virtual/2024/oral/35563
  - label: GitHub
    url: https://github.com/romilbert/samformer
description: >
  Lightweight transformer for multivariate long-term time series forecasting
  using sharpness-aware minimization and channel-wise attention. Identifies
  attention as responsible for poor generalization in forecasting transformers
  and addresses it via SAM optimization. Surpasses TSMixer by 14.33% on
  average with 4x fewer parameters. Presented as an oral at ICML 2024 from
  Huawei Paris Noah's Ark Lab.
tags:
