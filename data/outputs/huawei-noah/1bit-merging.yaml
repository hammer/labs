name: 1bit-Merging
slug: 1bit-merging
lab: huawei-noah
date: 2025-02-15
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2502.10743
description: >
  Dynamic quantized merging framework for large language models that
  integrates task-specific routing with 1-bit quantized task vectors.
  Leverages the observation that different task-specific models store
  knowledge in distinct layers (chat models in attention, math/code in
  MLP) to balance performance and storage efficiency when merging
  domain-specific fine-tuned models.
tags:
