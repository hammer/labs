name: PanGu-Sigma
slug: pangu-sigma
lab: huawei-noah
date: 2023-03-20
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2303.10845
description: >
  Trillion-parameter sparse language model (1.085T parameters) extending
  PanGu-alpha with Random Routed Experts (RRE). Trained on 329B tokens in
  40+ languages on 512 Ascend 910 AI accelerators using MindSpore. Achieves
  state-of-the-art zero-shot Chinese NLP and strong fine-tuned performance
  on dialogue, QA, translation, and code generation.
