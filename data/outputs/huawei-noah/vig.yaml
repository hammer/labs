name: Vision GNN (ViG)
slug: vig
lab: huawei-noah
date: 2022-06-01
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2206.00272
  - label: "Published: NeurIPS 2022"
    url: https://proceedings.neurips.cc/paper_files/paper/2022/hash/3743e69c8e47eb2e6d3afaea80e439fb-Abstract-Conference.html
  - label: GitHub
    url: https://github.com/huawei-noah/Efficient-AI-Backbones
description: >
  Novel vision architecture representing images as graphs of nodes rather
  than sequences or grids. Splits images into patches viewed as nodes,
  connects nearest neighbors, and uses Grapher modules with graph convolution
  plus FFN modules for feature transformation. Supports both isotropic and
  pyramid architectures. Published at NeurIPS 2022.
