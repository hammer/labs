description: >
  Huawei's family of AI training and inference processors. Ascend 310
  (announced Oct 2018) targets edge inference at under 10W. Ascend 910
  (launched Aug 2019) is the flagship AI training chip, used to train
  PanGu models. Ascend 910B (2023) was the first post-sanctions chip
  manufactured by SMIC at 7nm. Ascend 910C (H2 2024) uses dual-die
  packaging for improved performance. Key infrastructure for China's
  domestic AI ecosystem.
