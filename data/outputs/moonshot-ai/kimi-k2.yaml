name: Kimi K2
slug: kimi-k2
lab: moonshot-ai
date: 2025-07-11
flagship: true
sources:
  - label: "Paper (arXiv)"
    url: https://arxiv.org/abs/2507.20534
  - label: "Project Page"
    url: https://moonshotai.github.io/Kimi-K2/
  - label: GitHub
    url: https://github.com/MoonshotAI/Kimi-K2
  - label: HuggingFace
    url: https://huggingface.co/moonshotai/Kimi-K2-Instruct
  - label: Artificial Analysis
    url: https://artificialanalysis.ai/models/kimi-k2
description: >
  Landmark 1-trillion parameter MoE model family (32B active) released as
  open-weight. 384 experts with 8 activated per token. Pre-trained on 15.5T
  tokens on H800 GPUs using the MuonClip optimizer, with context extended
  from 4K to 128K via YaRN. Focused on agentic intelligence and tool use.
  Evolved through Thinking and Instruct-0905 variants.
tags:
  - moe
  - frontier
  - open-weight
  - agentic
  - reasoning
outputs:
  - name: Kimi K2 Instruct
    type: model
    model:
      architecture: moe
      parameters: 1T
      active_parameters: 32B
  - name: "Kimi K2 Tech Report: Open Agentic Intelligence"
    type: paper
    date: 2025-07-28
    paper:
      arxiv: "2507.20534"
  - name: Kimi-K2-Instruct-0905
    type: model
    date: 2025-09-02
    description: >
      Updated K2 with expanded 256k context window and improved coding
      performance.
    sources:
      - label: HuggingFace
        url: https://huggingface.co/moonshotai/Kimi-K2-Instruct-0905
