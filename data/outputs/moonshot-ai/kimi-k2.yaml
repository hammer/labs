        url: https://simonwillison.net/2025/Sep/6/kimi-k2-instruct-0905/
      - label: Artificial Analysis
        url: https://artificialanalysis.ai/models/kimi-k2-0905
    model:
      architecture: moe
      parameters: 1T
      active_parameters: 32B
      context_window: 256000
  - name: Kimi K2 Thinking
    type: model
    date: 2025-11-06
    description: >
      Reasoning-heavy "thinking agent" capable of hundreds of sequential
      tool calls.
