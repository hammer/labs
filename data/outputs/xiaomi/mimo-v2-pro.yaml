notes: >
  MiMo-V2-Pro first appeared anonymously as "Hunter Alpha" on OpenRouter on
  March 11, 2026, with no developer attribution. The model quickly topped
  leaderboards (ClawEval 61.5, approaching Claude Opus 4.6) and processed
  1.27 million requests in its first week. It was widely speculated to be
  DeepSeek V4 — Reuters testing found it described itself as "a Chinese AI
  model primarily trained in Chinese" with a May 2025 data cutoff matching
  DeepSeek's. On March 18-19, Xiaomi's MiMo team lead Luo Fuli confirmed
  it was an "early internal test build" of MiMo-V2-Pro, designed to gather
  unbiased developer feedback. Xiaomi's stock surged 5.8% on the reveal.
  Coverage: Technology.org
  (https://www.technology.org/2026/03/19/whos-that-ai-the-mystery-model-everyone-blamed-on-deepseek-turned-out-to-be-xiaomi/),
  Taipei Times
  (https://www.taipeitimes.com/News/feat/archives/2026/03/19/2003854074),
  Abacus News
  (https://www.abacusnews.com/how-xiaomi-outsmarted-the-ai-world-with-hunter-alpha/),
  Business Today
  (https://www.businesstoday.in/technology/news/story/mystery-behind-hunter-alpha-ai-model-revealed-know-what-it-is-and-why-everyones-talking-about-it-521430-2026-03-19/).
