description: >
  Xiaomi's 1-trillion parameter MoE flagship (42B active) designed for agentic
  workloads with a 1-million-token context window. Before its official reveal,
  MiMo-V2-Pro gained worldwide attention as the anonymous "Hunter Alpha" model
  on OpenRouter, widely misattributed to DeepSeek V4.
