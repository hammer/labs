description: >
  Family of 10 open-source multimodal MoE models ranging from 424B total
  parameters (47B active) down to a 0.3B dense model. Uses a heterogeneous
  modality structure supporting parameter sharing across modalities with
  dedicated parameters per modality. Initially announced March 16, 2025;
  fully open-sourced under Apache 2.0 on June 30, 2025. Achieves SOTA on
  multiple text and multimodal benchmarks.
tags:
  - moe
  - open-weight
  - multimodal
