      notes: Flagship multimodal MoE model
    - name: ERNIE-4.5-VL-28B-A3B
      parameters: 28B
      active_parameters: 3B
      notes: Lightweight multimodal MoE
    - name: ERNIE-4.5-VL-28B-A3B-Thinking
