description: >
  Table Structure Recognition Framework with Layout Pointer mechanism.
  Reformulates text region prediction into a direct pointing problem,
  eliminating the need for bounding-box detection and post-processing
  matching. SOTA on PubTabNet, FinTabNet, and SynthTabNet. Published
  at IJCAI 2024.
