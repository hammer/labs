description: >
  102B-parameter bilingual (English/Korean) MoE model with 12B active
  parameters per token. Trained on 20 trillion tokens including 4.5T
  synthesized tokens for underserved languages. Introduces SnapPO
  (Snapshot Sampling for Policy Optimization), a cyclic off-policy RL
  framework that decouples data generation, reward computation, and
  training for scalable alignment.
