description: >
  <p>Open VLM family expanding Molmo's image strengths to
  <strong>video and multi-image understanding</strong>. 4B (Qwen 3),
  8B (Qwen 3), and 7B-O (OLMo backbone, fully open end-to-end).
  7 new video datasets + 2 multi-image datasets collected without
  closed VLMs.</p>

  <p>SOTA open model for video tracking, leapfrogging Gemini 3 Pro.
  8B surpassed prior 72B Molmo on image QA. Capabilities: video QA,
  video counting, video tracking, and point-driven grounding across
  single image, multi-image, and video.</p>
