    type: library
    sources:
      - label: GitHub
        url: https://github.com/IDEA-Research/DN-DETR
    description: >
      Official implementation of DN-DETR denoising training for DETR.
      43.4 AP in 12 epochs with ResNet-50.
    library:
      github: https://github.com/IDEA-Research/DN-DETR
  - name: "DN-DETR: Accelerate DETR Training by Introducing Query DeNoising"
    type: paper
    sources:
      - label: Paper (arXiv)
        url: https://arxiv.org/abs/2203.01305
    description: >
      Proposes denoising training to accelerate DETR convergence by reducing
      bipartite matching instability.
