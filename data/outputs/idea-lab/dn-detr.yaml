name: DN-DETR
slug: dn-detr
lab: idea-lab
date: 2022-03-02
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2203.01305
  - label: GitHub
    url: https://github.com/IDEA-Research/DN-DETR
description: >
  Accelerates DETR training by introducing query denoising. Feeds noisy
  ground-truth boxes into the decoder and trains the model to reconstruct
  original boxes, reducing bipartite matching difficulty. Achieves comparable
  performance to baseline with 50% training epochs.
tags:
  - vision
  - open-source
outputs:
