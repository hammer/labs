  - label: Project Page
    url: https://lhchen.top/MotionCLR/
description: >
  Motion generation and training-free editing via understanding attention
  mechanisms. Self-attention finds word-sequence correspondence while
  cross-attention measures frame sequential similarity. Enables motion
  editing via attention map manipulation including de-emphasizing,
  replacement, and example-based generation.
