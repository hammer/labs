name: OpenSeeD
slug: openseed
lab: idea-lab
date: 2023-03-14
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2303.08131
  - label: GitHub
    url: https://github.com/IDEA-Research/OpenSeeD
description: >
  A Simple Framework for Open-Vocabulary Segmentation and Detection. Jointly
  learns from different segmentation and detection datasets with a pre-trained
  text encoder for a common semantic space. Proposes decoupled decoding for
  foreground/background and conditioned mask decoding for box-to-mask.
