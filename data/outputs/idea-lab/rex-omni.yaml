  - label: Project Page
    url: https://rex-omni.github.io/
description: >
  3B-parameter MLLM that redefines object detection and visual perception
  as next-token prediction. Unifies detection, OCR, pointing, keypointing,
  and visual prompting. Trained on 22M data with GRPO-based reinforcement
  post-training. Achieves performance comparable to or exceeding regression-based
  models like DINO and Grounding DINO in zero-shot settings.
tags:
  - vision
  - object-detection
  - multimodal
  - open-source
