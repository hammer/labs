name: T-Rex-Omni
slug: t-rex-omni
lab: idea-lab
date: 2025-11-12
sources:
  - label: Paper (arXiv)
    url: https://arxiv.org/abs/2511.08997
  - label: GitHub
    url: https://github.com/IDEA-Research/Rex-Omni
description: >
  Integrates negative visual prompts into generic object detection. Introduces
  unified visual prompt encoder for positive and negative prompts, Negating
  Negative Computing module for dynamic suppression, and NNH loss for
  discriminative margins. Achieves strong zero-shot performance across COCO,
  LVIS, ODinW, and Roboflow100, with 51.2 APr on LVIS-minival for
  long-tailed scenarios.
tags:
  - vision
  - object-detection
  - visual-prompting
