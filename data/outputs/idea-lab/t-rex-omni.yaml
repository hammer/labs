  - name: T-Rex-Omni
    type: model
    sources:
      - label: GitHub
        url: https://github.com/IDEA-Research/Rex-Omni
    description: >
      Extends visual-prompted detection with negative visual prompts for
      suppressing hard negative distractors in open-set detection.
  - name: "T-Rex-Omni: Integrating Negative Visual Prompt in Generic Object Detection"
    type: paper
