description: >
  Expressive 3D Gaussian avatars from skeleton-guided 2D diffusion. Combines
  skeleton-guided score distillation with hybrid 3D Gaussian avatar
  representation built on neural implicit fields and parameterized 3D meshes.
  Enables real-time rendering, human video reenactment, and multi-subject
  scene composition.
