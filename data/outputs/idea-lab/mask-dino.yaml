description: >
  Unified Transformer-based framework for object detection and segmentation.
  Extends DINO with a mask prediction branch supporting instance, panoptic,
  and semantic segmentation. Achieves 54.7 AP on COCO instance, 59.5 PQ on
  COCO panoptic, and 60.8 mIoU on ADE20K semantic segmentation.
