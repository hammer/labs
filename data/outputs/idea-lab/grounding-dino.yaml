  - label: HuggingFace
    url: https://huggingface.co/IDEA-Research/grounding-dino-base
description: >
  Open-set object detector that marries DINO with grounded pre-training.
  Detects arbitrary objects using text prompts (category names or referring
  expressions). Achieves 52.5 zero-shot AP on COCO without any COCO training
  data and 63.0 AP after fine-tuning. One of the most widely adopted open-set
  detectors in the community.
