description: >
  First open-source Chinese Stable Diffusion model family. Trained on 20M
  filtered Chinese image-text pairs from Noah-Wukong and Zero datasets.
  Taiyi-Diffusion-XL extends to bilingual (Chinese-English) generation
  with 3.5B parameters via continuous pre-training on SDXL.
