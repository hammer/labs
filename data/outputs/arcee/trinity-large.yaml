description: >
  <p>398B total / 13B active MoE (256 routed + 1 shared expert, top-4
  routing, 1.56% activation ratio). 60 transformer + 6 dense layers,
  3072 model dim, 48 query heads, 8 KV heads. Interleaved local (4096
  window) and global attention with gated attention and depth-scaled
  sandwich norm. Sigmoid routing with SMEBU load balancing.</p>

  <p>Trained on <strong>17T tokens</strong> in 3 phases using
  <strong>2,048 NVIDIA B300 GPUs in ~33 days</strong> (~$20M total for
  all Trinity models). Muon optimizer, zero loss spikes. 512K native
  context (tested to 1M). Data curated by DatologyAI (8T+ synthetic).</p>

  <p>MMLU: 87.2 (instruct), MMLU-Pro: 75.3, GPQA-Diamond: 63.3. The
  reasoning variant <a href="/outputs/arcee/trinity-large-thinking">Trinity-Large-Thinking</a>
  (April 2026, AA Intelligence Index 32) became the #1 most-used open model in the US
  on OpenRouter. Apache 2.0.</p>
